# 搜索关键词
keyWords:
  - 显示器
  - 面包
  - 小米
  - 米
  - 鞋

# 最低评论数
lowCommentNum: 1
# 最低值率
lowWorthyNum: 6
# 最低价格, 0 表示不限制
minPrice: 0
# 最高价格, 0 表示不限制
maxPrice: 0
# 满意商品数量
satisfyNum: 5
# 过滤词
filterWords:
  - "过期"
  - "售罄"

# 每组关键词的独立规则. 配置后会覆盖仅按 keyWords 命中的关注商品推送逻辑.
keywordRules:
  - enabled: true
    words:
      - 显示器
    filterWords:
      - 二手
      - 支架
    lowCommentNum: 5
    lowWorthyNum: 20
    minPrice: 300
    maxPrice: 2000
  - enabled: true
    words:
      - 面包
      - 零食
    filterWords:
      - 临期
    lowCommentNum: 1
    lowWorthyNum: 5
    maxPrice: 100

# 定时任务多长执行一次 单位秒 默认 3个小时
tickTime: 10800

# 全站热门与关注作者推送. 默认关闭.
globalHot:
  enabled: false
  windowHours: 3
  minCommentNum: 200
  hotKeywords: []
  followAuthorsEnabled: false
  followedAuthors: []
  authorKeywords: []

# Telegram Bot 推送. 生产环境在面板里保存到数据库.
telegram:
  enabled: false
  botToken: ""
  chatId: ""
  parseMode: "HTML"
  disableWebPagePreview: false
