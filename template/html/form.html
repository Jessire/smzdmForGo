<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>新增签到账号</title>
  <meta name="renderer" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/layui/2.7.6/css/layui.css" media="all">
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: #fff;
      --line: rgba(0, 0, 0, 0.08);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --blue: #0071e3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }
    .wrap { padding: 22px; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 22px;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.07);
    }
    h1 { margin: 0 0 8px; font-size: 24px; line-height: 1.2; letter-spacing: 0; }
    p { margin: 0 0 20px; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease;
    }
    .field input { height: 42px; padding: 0 12px; }
    .field textarea { min-height: 178px; padding: 12px; resize: vertical; }
    .field input:focus,
    .field textarea:focus {
      border-color: rgba(0, 113, 227, 0.68);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.14);
    }
    .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
    .btn {
      height: 40px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 16px;
      background: var(--blue);
      color: #fff;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 113, 227, 0.22);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>新增签到账号</h1>
      <p>备注用于区分账号, Cookie 会保存到当前数据库。</p>
      <form id="accountForm">
        <div class="field">
          <label for="remark">备注</label>
          <input id="remark" type="text" name="remark" autocomplete="off">
        </div>
        <div class="field">
          <label for="cookie">Cookie</label>
          <textarea id="cookie" name="cookie"></textarea>
        </div>
        <div class="actions">
          <button class="btn" type="submit">保存账号</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/layui/2.7.6/layui.js" charset="utf-8"></script>
  <script>
    layui.use(function () {
      var layer = layui.layer;
      var $ = layui.jquery;

      $('#accountForm').on('submit', function () {
        var payload = {
          remark: $('#remark').val(),
          cookie: $('#cookie').val()
        };
        $.ajax({
          url: '/addConf',
          type: 'post',
          dataType: 'json',
          contentType: 'application/json',
          data: JSON.stringify(payload),
          success: function () {
            layer.msg('添加成功');
            var index = parent.layer.getFrameIndex(window.name);
            parent.location.reload();
            setTimeout(function () { parent.layer.close(index); }, 500);
          },
          error: function (xhr) {
            try {
              layer.msg(JSON.parse(xhr.responseText).msg || '添加失败');
            } catch (e) {
              layer.msg('添加失败');
            }
          }
        });
        return false;
      });
    });
  </script>
</body>
</html>
