<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>什么值得买管理面板</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/layui/2.7.6/css/layui.css" media="all">
  <style>
    body { margin: 0; background: #f6f7f9; color: #1f2933; }
    .page { padding: 16px; }
    .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; padding: 16px; }
    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .config-grid { display: grid; grid-template-columns: repeat(4, minmax(140px, 1fr)); gap: 12px; }
    .config-span-2 { grid-column: span 2; }
    .config-span-4 { grid-column: span 4; }
    .layui-form-label { width: 96px; }
    .layui-input-block { margin-left: 126px; }
    .rule-form { padding: 18px 18px 4px; }
    @media (max-width: 900px) {
      .config-grid { grid-template-columns: 1fr; }
      .config-span-2, .config-span-4 { grid-column: span 1; }
      .layui-form-label { width: 86px; }
      .layui-input-block { margin-left: 116px; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="layui-tab layui-tab-brief" lay-filter="mainTabs">
    <ul class="layui-tab-title">
      <li class="layui-this">签到账号</li>
      <li>商品规则</li>
    </ul>
    <div class="layui-tab-content">
      <div class="layui-tab-item layui-show">
        <div class="panel">
          <table class="layui-hide" id="accountTable" lay-filter="accountTable"></table>
        </div>
      </div>
      <div class="layui-tab-item">
        <div class="panel">
          <form class="layui-form" lay-filter="productConfigForm">
            <div class="config-grid">
              <div class="config-span-2">
                <label class="layui-form-label">关键词</label>
                <div class="layui-input-block">
                  <textarea name="keyWords" class="layui-textarea" rows="5"></textarea>
                </div>
              </div>
              <div class="config-span-2">
                <label class="layui-form-label">过滤词</label>
                <div class="layui-input-block">
                  <textarea name="filterWords" class="layui-textarea" rows="5"></textarea>
                </div>
              </div>
              <div>
                <label class="layui-form-label">最低评论</label>
                <div class="layui-input-block">
                  <input type="number" name="lowCommentNum" min="0" class="layui-input">
                </div>
              </div>
              <div>
                <label class="layui-form-label">最低值率</label>
                <div class="layui-input-block">
                  <input type="number" name="lowWorthyNum" min="0" class="layui-input">
                </div>
              </div>
              <div>
                <label class="layui-form-label">最低价格</label>
                <div class="layui-input-block">
                  <input type="number" name="minPrice" min="0" step="0.01" class="layui-input">
                </div>
              </div>
              <div>
                <label class="layui-form-label">最高价格</label>
                <div class="layui-input-block">
                  <input type="number" name="maxPrice" min="0" step="0.01" class="layui-input">
                </div>
              </div>
              <div>
                <label class="layui-form-label">推送数量</label>
                <div class="layui-input-block">
                  <input type="number" name="satisfyNum" min="1" class="layui-input">
                </div>
              </div>
              <div class="config-span-4">
                <div class="toolbar">
                  <button type="button" class="layui-btn" id="saveProductConfig">保存规则</button>
                  <button type="button" class="layui-btn layui-btn-primary" id="reloadProductConfig">重新加载</button>
                </div>
              </div>
            </div>
          </form>
          <div class="toolbar">
            <button type="button" class="layui-btn layui-btn-sm" id="addRule">新增关键词规则</button>
          </div>
          <table class="layui-hide" id="ruleTable" lay-filter="ruleTable"></table>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="text/html" id="accountToolbar">
  <div class="layui-btn-container">
    <button class="layui-btn layui-btn-sm" lay-event="getInsert">新增账号</button>
  </div>
</script>

<script type="text/html" id="accountActions">
  <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="check">立即签到</a>
</script>

<script type="text/html" id="ruleActions">
  <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
  <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="remove">删除</a>
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/layui/2.7.6/layui.js"></script>
<script>
var BASE_URL = window.location.origin;
var productConfig = {
  keyWords: [],
  filterWords: [],
  lowCommentNum: 0,
  lowWorthyNum: 0,
  minPrice: 0,
  maxPrice: 0,
  satisfyNum: 5,
  keywordRules: []
};

layui.use(function(){
  var layer = layui.layer;
  var table = layui.table;
  var $ = layui.jquery;
  var form = layui.form;

  table.render({
    elem: '#accountTable',
    height: 420,
    url: BASE_URL + '/conf',
    title: 'smzdm签到表',
    page: false,
    toolbar: '#accountToolbar',
    defaultToolbar: [],
    totalRow: false,
    cols: [[
      {type: 'checkbox', fixed: 'left'},
      {field: 'Id', title: 'ID', width: 80, sort: true, fixed: 'left'},
      {field: 'LastTIme', title: '最近执行时间', align: 'center', width: 180},
      {field: 'Remark', title: '备注', width: 180, align: 'center'},
      {field: 'LastMsg', title: '最近执行返回消息', align: 'center', minWidth: 260},
      {field: 'LastResult', title: '最近执行结果', align: 'center', width: 140},
      {field: 'Cookie', title: 'cookie', align: 'center', minWidth: 240},
      {fixed: 'right', width: 120, align: 'center', toolbar: '#accountActions'}
    ]]
  });

  table.render({
    elem: '#ruleTable',
    data: [],
    page: false,
    defaultToolbar: [],
    cols: [[
      {field: 'wordsText', title: '关键词', minWidth: 160},
      {field: 'filterWordsText', title: '过滤词', minWidth: 180},
      {field: 'lowCommentNum', title: '评论', width: 90},
      {field: 'lowWorthyNum', title: '值率', width: 90},
      {field: 'minPrice', title: '最低价', width: 100},
      {field: 'maxPrice', title: '最高价', width: 100},
      {fixed: 'right', width: 120, align: 'center', toolbar: '#ruleActions'}
    ]]
  });

  loadProductConfig();

  table.on('toolbar(accountTable)', function(obj){
    if (obj.event === 'getInsert') {
      layer.open({
        type: 2,
        title: 'smzdm签到信息',
        shadeClose: true,
        offset: '10%',
        area: ['60%', '80%'],
        content: 'html/form'
      });
    }
  });

  table.on('tool(accountTable)', function(obj){
    if (obj.event !== 'check') {
      return;
    }
    var lineData = obj.data;
    $.ajax({
      url: BASE_URL + '/check',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify([{ cookie: lineData.Cookie, id: lineData.Id, remark: lineData.Remark }]),
      async: false,
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        layer.msg(res.data || res.msg);
        table.reload('accountTable');
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  });

  table.on('tool(ruleTable)', function(obj){
    if (obj.event === 'edit') {
      openRuleDialog(obj.data._index);
    }
    if (obj.event === 'remove') {
      productConfig.keywordRules.splice(obj.data._index, 1);
      renderRules();
    }
  });

  $('#addRule').on('click', function(){
    openRuleDialog(-1);
  });

  $('#saveProductConfig').on('click', function(){
    productConfig.keyWords = textToList($('[name="keyWords"]').val());
    productConfig.filterWords = textToList($('[name="filterWords"]').val());
    productConfig.lowCommentNum = toInt($('[name="lowCommentNum"]').val());
    productConfig.lowWorthyNum = toInt($('[name="lowWorthyNum"]').val());
    productConfig.minPrice = toFloat($('[name="minPrice"]').val());
    productConfig.maxPrice = toFloat($('[name="maxPrice"]').val());
    productConfig.satisfyNum = toInt($('[name="satisfyNum"]').val()) || 5;

    $.ajax({
      url: BASE_URL + '/productConfig',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify(productConfig),
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        productConfig = normalizeConfig(res.data);
        fillProductForm();
        renderRules();
        layer.msg(res.msg || '保存成功');
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  });

  $('#reloadProductConfig').on('click', loadProductConfig);

  function loadProductConfig() {
    $.ajax({
      url: BASE_URL + '/productConfig',
      dataType: 'json',
      type: 'GET',
      success: function(res) {
        productConfig = normalizeConfig(res.data);
        fillProductForm();
        renderRules();
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  }

  function fillProductForm() {
    form.val('productConfigForm', {
      keyWords: listToText(productConfig.keyWords),
      filterWords: listToText(productConfig.filterWords),
      lowCommentNum: productConfig.lowCommentNum,
      lowWorthyNum: productConfig.lowWorthyNum,
      minPrice: productConfig.minPrice,
      maxPrice: productConfig.maxPrice,
      satisfyNum: productConfig.satisfyNum
    });
  }

  function renderRules() {
    var data = productConfig.keywordRules.map(function(rule, index){
      return {
        _index: index,
        wordsText: listToText(rule.words).replace(/\n/g, ', '),
        filterWordsText: listToText(rule.filterWords).replace(/\n/g, ', '),
        lowCommentNum: rule.lowCommentNum || '',
        lowWorthyNum: rule.lowWorthyNum || '',
        minPrice: rule.minPrice || '',
        maxPrice: rule.maxPrice || ''
      };
    });
    table.reload('ruleTable', { data: data });
  }

  function openRuleDialog(index) {
    var rule = index >= 0 ? productConfig.keywordRules[index] : {};
    var html = [
      '<form class="layui-form rule-form" lay-filter="ruleForm">',
      '<div class="layui-form-item"><label class="layui-form-label">关键词</label><div class="layui-input-block"><textarea name="words" class="layui-textarea" rows="3"></textarea></div></div>',
      '<div class="layui-form-item"><label class="layui-form-label">过滤词</label><div class="layui-input-block"><textarea name="filterWords" class="layui-textarea" rows="3"></textarea></div></div>',
      '<div class="layui-form-item"><label class="layui-form-label">最低评论</label><div class="layui-input-block"><input type="number" name="lowCommentNum" min="0" class="layui-input"></div></div>',
      '<div class="layui-form-item"><label class="layui-form-label">最低值率</label><div class="layui-input-block"><input type="number" name="lowWorthyNum" min="0" class="layui-input"></div></div>',
      '<div class="layui-form-item"><label class="layui-form-label">最低价格</label><div class="layui-input-block"><input type="number" name="minPrice" min="0" step="0.01" class="layui-input"></div></div>',
      '<div class="layui-form-item"><label class="layui-form-label">最高价格</label><div class="layui-input-block"><input type="number" name="maxPrice" min="0" step="0.01" class="layui-input"></div></div>',
      '</form>'
    ].join('');

    layer.open({
      type: 1,
      title: index >= 0 ? '编辑关键词规则' : '新增关键词规则',
      area: ['560px', '620px'],
      content: html,
      btn: ['保存', '取消'],
      success: function(){
        form.val('ruleForm', {
          words: listToText(rule.words || []),
          filterWords: listToText(rule.filterWords || []),
          lowCommentNum: rule.lowCommentNum || '',
          lowWorthyNum: rule.lowWorthyNum || '',
          minPrice: rule.minPrice || '',
          maxPrice: rule.maxPrice || ''
        });
      },
      yes: function(layerIndex, layero){
        var values = form.val('ruleForm');
        var nextRule = {
          words: textToList(values.words),
          filterWords: textToList(values.filterWords),
          lowCommentNum: toInt(values.lowCommentNum),
          lowWorthyNum: toInt(values.lowWorthyNum),
          minPrice: toFloat(values.minPrice),
          maxPrice: toFloat(values.maxPrice)
        };
        if (!nextRule.words.length) {
          layer.msg('关键词不能为空');
          return;
        }
        if (index >= 0) {
          productConfig.keywordRules[index] = nextRule;
        } else {
          productConfig.keywordRules.push(nextRule);
        }
        renderRules();
        layer.close(layerIndex);
      }
    });
  }

  function normalizeConfig(value) {
    value = value || {};
    return {
      keyWords: value.keyWords || [],
      filterWords: value.filterWords || [],
      lowCommentNum: value.lowCommentNum || 0,
      lowWorthyNum: value.lowWorthyNum || 0,
      minPrice: value.minPrice || 0,
      maxPrice: value.maxPrice || 0,
      satisfyNum: value.satisfyNum || 5,
      keywordRules: (value.keywordRules || []).map(function(rule){
        return {
          words: rule.words || [],
          filterWords: rule.filterWords || [],
          lowCommentNum: rule.lowCommentNum || 0,
          lowWorthyNum: rule.lowWorthyNum || 0,
          minPrice: rule.minPrice || 0,
          maxPrice: rule.maxPrice || 0
        };
      })
    };
  }

  function listToText(list) {
    return (list || []).join('\n');
  }

  function textToList(text) {
    return (text || '').split(/[\n,，\t\r]+/).map(function(item){
      return item.trim();
    }).filter(function(item, index, list){
      return item && list.indexOf(item) === index;
    });
  }

  function toInt(value) {
    var parsed = parseInt(value, 10);
    return isNaN(parsed) || parsed < 0 ? 0 : parsed;
  }

  function toFloat(value) {
    var parsed = parseFloat(value);
    return isNaN(parsed) || parsed < 0 ? 0 : parsed;
  }

  function readError(xhr) {
    try {
      return JSON.parse(xhr.responseText).msg || '请求失败';
    } catch (e) {
      return '请求失败';
    }
  }
});
</script>
</body>
</html>
