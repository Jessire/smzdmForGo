<script src="https://cdnjs.cloudflare.com/ajax/libs/layui/2.7.6/layui.js"></script>
<script>
var BASE_URL = window.location.origin;
var productConfig = {
  keyWords: [],
  filterWords: [],
  lowCommentNum: 0,
  lowWorthyNum: 0,
  minPrice: 0,
  maxPrice: 0,
  satisfyNum: 5,
  tickTime: 10800,
  cron: '0 10 10 ? * *',
  telegram: { enabled: false, botToken: '', chatId: '', parseMode: 'HTML', disableWebPagePreview: false },
  keywordRules: []
};
var selectedRuleIndex = -1;
var previewOpenUrl = '';
var filterEditorWords = [];
var telegramHealthTested = false;
var dashboardStats = { scanned: 0, matched: 0, pushed: 0, failed: 0 };
var previewPlaceholder = placeholderImage('商');
var themeMode = readStoredThemeMode();

applyThemeMode(themeMode);

function placeholderImage(label) {
  var text = String(label || '商').trim().slice(0, 1) || '商';
  text = text.replace(/[&<>]/g, function(ch){ return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[ch]; });
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">' +
    '<rect width="240" height="240" rx="22" fill="#eef3f9"/>' +
    '<rect x="1" y="1" width="238" height="238" rx="21" fill="none" stroke="#dbe3ee" stroke-width="2"/>' +
    '<text x="120" y="132" dominant-baseline="middle" text-anchor="middle" fill="#65748a" font-family="Arial, sans-serif" font-size="76" font-weight="700">' + text + '</text>' +
    '</svg>';
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

function readStoredThemeMode() {
  try {
    var value = localStorage.getItem('smzdmThemeMode') || 'system';
    return /^(system|light|dark)$/.test(value) ? value : 'system';
  } catch (e) {
    return 'system';
  }
}

function applyThemeMode(mode) {
  themeMode = /^(system|light|dark)$/.test(mode) ? mode : 'system';
  document.body.setAttribute('data-theme-mode', themeMode);
  document.body.setAttribute('data-theme', resolvedThemeMode());
  updateThemeButton();
}

function resolvedThemeMode() {
  if (themeMode === 'dark' || themeMode === 'light') {
    return themeMode;
  }
  try {
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  } catch (e) {
    return 'light';
  }
}

function themeIconSvg(name) {
  if (name === 'moon') {
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5 7 7 0 1 0 20.5 14.5Z"/></svg>';
  }
  if (name === 'system') {
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><path d="M12 3.5a8.5 8.5 0 0 0 0 17Z" fill="currentColor" stroke="none"/></svg>';
  }
  return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M4.93 19.07l1.41-1.41"/><path d="M17.66 6.34l1.41-1.41"/></svg>';
}

function updateThemeButton() {
  var button = document.getElementById('themeModeButton');
  if (!button) { return; }
  var label = themeMode === 'light' ? '浅色主题' : (themeMode === 'dark' ? '深色主题' : '跟随系统主题');
  button.setAttribute('title', '当前: ' + label + '. 点击切换主题');
  button.setAttribute('aria-label', '当前: ' + label + '. 点击切换主题');
  var icon = button.querySelector('.theme-icon');
  if (icon) {
    var resolved = resolvedThemeMode();
    icon.innerHTML = themeIconSvg(themeMode === 'system' ? 'system' : (resolved === 'dark' ? 'moon' : 'sun'));
  }
  var text = button.querySelector('.sr-only');
  if (text) {
    text.textContent = label;
  }
}

function cycleThemeMode() {
  var next = themeMode === 'system' ? 'light' : (themeMode === 'light' ? 'dark' : 'system');
  try {
    if (next === 'system') {
      localStorage.removeItem('smzdmThemeMode');
    } else {
      localStorage.setItem('smzdmThemeMode', next);
    }
  } catch (e) {}
  applyThemeMode(next);
}

try {
  var colorSchemeQuery = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
  if (colorSchemeQuery) {
    colorSchemeQuery.addEventListener('change', function(){
      if (themeMode === 'system') {
        applyThemeMode('system');
      }
    });
  }
} catch (e) {}

function stripInjectedTextOutlines(root) {
  root = root || document.body;
  if (!root) { return; }
  var nodes = root.querySelectorAll ? root.querySelectorAll('[style*="text-shadow"], [style*="-webkit-text-stroke"]') : [];
  if (root.nodeType === 1 && root.getAttribute && /text-shadow|-webkit-text-stroke/.test(root.getAttribute('style') || '')) {
    nodes = Array.prototype.concat.call([root], Array.prototype.slice.call(nodes));
  }
  Array.prototype.forEach.call(nodes, function(node){
    node.style.removeProperty('text-shadow');
    node.style.removeProperty('-webkit-text-stroke');
    if (!node.getAttribute('style')) {
      node.removeAttribute('style');
    }
  });
}

function startTextOutlineGuard() {
  stripInjectedTextOutlines(document.body);
  if (!window.MutationObserver || window.__smzdmTextOutlineGuard) { return; }
  var scheduled = false;
  window.__smzdmTextOutlineGuard = new MutationObserver(function(){
    if (scheduled) { return; }
    scheduled = true;
    requestAnimationFrame(function(){
      scheduled = false;
      stripInjectedTextOutlines(document.body);
    });
  });
  window.__smzdmTextOutlineGuard.observe(document.body, {
    childList: true,
    subtree: true,
    attributes: true,
    attributeFilter: ['style']
  });
}

layui.use(function(){
  var layer = layui.layer;
  var $ = layui.jquery;
  startTextOutlineGuard();

  $('#reloadProductConfig').on('click', loadProductConfig);
  $('#addRule').on('click', function(){
    syncEditorToRule();
    productConfig.keywordRules.push(emptyRule());
    selectRule(productConfig.keywordRules.length - 1);
    renderRules();
  });
  $('#searchAllRules').on('click', searchAllRules);
  $('#duplicateRule').on('click', function(){
    if (!currentRule()) { return; }
    syncEditorToRule();
    var copy = normalizeRule(JSON.parse(JSON.stringify(currentRule())));
    copy.words = [(copy.words[0] || '') + ' 副本'];
    delete copy.previewPic;
    productConfig.keywordRules.splice(selectedRuleIndex + 1, 0, copy);
    selectRule(selectedRuleIndex + 1);
    renderRules();
  });
  $('#removeRule').on('click', removeSelectedRule);
  $('#saveProductConfig, #saveNotifyConfig').on('click', saveProductConfig);
  $('#searchRule').on('click', searchSelectedRule);
  $('#testTelegram').on('click', testTelegram);
  $('#reloadPushLogs').on('click', loadPushLogs);
  $('#editNotifyConfig').on('click', function(){
    var panel = $('.notification-shell');
    var details = $('#notifyDetails');
    var expanded = !panel.hasClass('is-expanded');
    panel.toggleClass('is-expanded', expanded);
    details.prop('hidden', !expanded);
    $(this).attr('aria-expanded', expanded ? 'true' : 'false');
  });
  $('#topTelegramToggle').on('click', function(){
    var next = !$('#telegramEnabled').is(':checked');
    $('#telegramEnabled').prop('checked', next).trigger('change');
    readNotifyForm();
    markConfigDirty();
  });
  $('#themeModeButton').on('click', cycleThemeMode);
  $('#openSearchPage').on('click', function(){
    var rule = currentRuleFromEditor();
    var keyword = firstWord(rule);
    var url = previewOpenUrl || keywordSearchUrl(keyword);
    if (url) {
      window.open(url, '_blank', 'noopener');
    }
  });
  bindFilterTokenEditor();
  $('#keywordInput, #lowCommentInput, #lowWorthyInput, #minPriceInput, #maxPriceInput, #enabledInput, #tickValueInput, #tickUnitInput, #satisfyNumInput').on('input change', function(){
    syncEditorToRule();
    updateSwitchLabels();
    updateCurrentRuleOverview('需验证', true);
    renderRules();
    markConfigDirty();
  });
  $('#telegramEnabled, #telegramDisablePreview, #telegramBotToken, #telegramChatId, #telegramParseMode').on('input change', function(){
    telegramHealthTested = false;
    updateSwitchLabels();
  });
  $('#previewImage').on('error', function(){
    this.onerror = null;
    this.src = previewPlaceholder;
  });

  loadProductConfig();
  loadPushLogs();

  function loadProductConfig() {
    $.ajax({
      url: BASE_URL + '/productConfig',
      dataType: 'json',
      type: 'GET',
      success: function(res) {
        productConfig = normalizeConfig(res.data);
        fillNotifyForm();
        renderRules();
        renderSummary();
        selectRule(productConfig.keywordRules.length ? 0 : -1);
        hydrateRuleThumbnails();
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  }

  function bindFilterTokenEditor() {
    $('#filterTokenBox').on('click', function(){
      $('#filterInput').trigger('focus');
    });
    $('#filterInput').on('keydown', function(e){
      if (e.key === 'Enter' || e.key === ',' || e.key === '，' || e.key === 'Tab') {
        if (($(this).val() || '').trim()) {
          e.preventDefault();
          addFilterWords($(this).val());
        }
        return;
      }
      if (e.key === 'Backspace' && !$(this).val() && filterEditorWords.length) {
        e.preventDefault();
        removeFilterWord(filterEditorWords.length - 1);
      }
    });
    $('#filterInput').on('paste', function(e){
      var clipboard = e.originalEvent && e.originalEvent.clipboardData;
      var text = clipboard ? clipboard.getData('text') : '';
      if (/[\n,，\t\r]+/.test(text)) {
        e.preventDefault();
        addFilterWords(text);
      }
    });
    $('#filterInput').on('blur', function(){
      commitFilterInput();
    });
  }

  function setFilterWordsInEditor(list) {
    filterEditorWords = textToList(list);
    $('#filterInput').val('');
    renderFilterTokens();
  }

  function getFilterWordsFromEditor() {
    return textToList(filterEditorWords.concat(textToList($('#filterInput').val())));
  }

  function addFilterWords(value) {
    var words = textToList(value);
    if (!words.length) { return; }
    filterEditorWords = textToList(filterEditorWords.concat(words));
    $('#filterInput').val('');
    renderFilterTokens();
    syncEditorToRule();
    renderRules();
  }

  function removeFilterWord(index) {
    if (index < 0 || index >= filterEditorWords.length) { return; }
    filterEditorWords.splice(index, 1);
    renderFilterTokens();
    syncEditorToRule();
    renderRules();
  }

  function commitFilterInput() {
    if (($('#filterInput').val() || '').trim()) {
      addFilterWords($('#filterInput').val());
    } else {
      renderFilterTokens();
    }
  }

  function renderFilterTokens() {
    var input = $('#filterInput');
    $('#filterTokenBox .filter-token').remove();
    filterEditorWords.forEach(function(word, index){
      var chip = $('<span class="filter-token"></span>');
      chip.append('<span title="' + escapeAttr(word) + '">' + escapeHtml(word) + '</span>');
      var remove = $('<button type="button" aria-label="删除过滤词 ' + escapeAttr(word) + '" title="删除"></button>');
      remove.html(iconSvg('x'));
      remove.on('mousedown', function(e){ e.preventDefault(); });
      remove.on('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        removeFilterWord(index);
        input.trigger('focus');
      });
      chip.append(remove);
      input.before(chip);
    });
  }

  function saveProductConfig(e) {
    syncEditorToRule();
    if (e && e.currentTarget && e.currentTarget.id === 'saveProductConfig' && currentRule()) {
      currentRule().enabled = true;
      $('#enabledInput').prop('checked', true);
    }
    readNotifyForm();
    productConfig.keyWords = flattenKeywords(productConfig.keywordRules);
    $.ajax({
      url: BASE_URL + '/productConfig',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify(productConfig),
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        productConfig = normalizeConfig(res.data);
        fillNotifyForm();
        renderRules();
        renderSummary();
        if (selectedRuleIndex >= productConfig.keywordRules.length) {
          selectedRuleIndex = productConfig.keywordRules.length - 1;
        }
        selectRule(selectedRuleIndex);
        layer.msg(res.msg || '保存成功');
        markConfigSaved();
        hydrateRuleThumbnails();
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  }

  function renderRules() {
    var body = $('#rulesBody');
    body.empty();
    body.toggleClass('is-scrollable', productConfig.keywordRules.length > 5);
    renderSummary();
    if (!productConfig.keywordRules.length) {
      body.append('<div class="empty">暂无关键词</div>');
      return;
    }
    productConfig.keywordRules.forEach(function(rule, index){
      var keywordRaw = firstWord(rule) || '未命名';
      var keyword = escapeHtml(keywordRaw);
      var row = $('<div class="rule-card" role="button" tabindex="0"></div>').toggleClass('active', index === selectedRuleIndex).toggleClass('disabled', rule.enabled === false);
      var image = $('<img class="thumb" loading="lazy" decoding="async">');
      image.attr('alt', keywordRaw);
      image.on('load', function(){
        classifyProductMedia(media, this);
      });
      image.on('error', function(){
        this.onerror = null;
        media.removeClass('media-wide media-tall').addClass('media-square');
        this.src = placeholderImage(keywordRaw);
      });
      var media = $('<div class="rule-thumb-media media-square"></div>').append(image);
      image.attr('src', rule.previewPic ? proxiedImageUrl(rule.previewPic) : placeholderImage(keywordRaw));
      var wrap = $('<div class="rule-main"></div>');
      wrap.append(media);
      var actionWrap = $('<div class="row-actions"></div>');
      var enabledSwitch = $(statusSwitch(rule.enabled));
      enabledSwitch.on('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        syncEditorToRule();
        productConfig.keywordRules[index].enabled = productConfig.keywordRules[index].enabled === false;
        if (selectedRuleIndex === index) {
          $('#enabledInput').prop('checked', !!productConfig.keywordRules[index].enabled);
        }
        renderRules();
        renderSummary();
      });
      actionWrap.append(enabledSwitch);
      actionWrap.append(iconButton('trash', '删除', 'danger icon-btn', function(e){ e.stopPropagation(); selectedRuleIndex = index; removeSelectedRule(); }));
      var titleRow = $('<div class="rule-title-row"></div>');
      var titleLeft = $('<div class="rule-title-left"></div>');
      titleLeft.append('<div class="keyword-name' + (rule.enabled ? '' : ' disabled') + '">' + keyword + '</div>');
      titleLeft.on('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        selectRule(index, { search: true });
      });
      titleRow.append(titleLeft);
      titleRow.append(actionWrap);
      wrap.append($('<div class="rule-text"></div>').append(titleRow));
      row.append(wrap);
      row.append('<div class="rule-filter">' + renderTags(rule.filterWords) + '</div>');
      var priceText = priceRange(rule);
      var metrics = $('<div class="rule-metrics"></div>');
      metrics.append('<div class="rule-stat stat-comment" data-label="评论">' + iconSvg('comment') + '<span>' + formatNumber(rule.lowCommentNum) + '</span></div>');
      metrics.append('<div class="rule-stat stat-worthy" data-label="值率">' + iconSvg('worthy') + '<span>' + formatNumber(rule.lowWorthyNum) + '%</span></div>');
      metrics.append('<div class="rule-stat rule-price stat-price" data-label="价格" title="' + escapeAttr(priceText) + '">' + iconSvg('price') + '<span>' + priceText + '</span></div>');
      row.append(metrics);
      row.on('click', function(){ selectRule(index, { search: true }); });
      row.on('keydown', function(e){
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectRule(index, { search: true });
        }
      });
      body.append(row);
    });
  }

  function selectRule(index, options) {
    syncEditorToRule();
    selectedRuleIndex = index;
    renderRules();
    fillEditor();
    clearPreview();
    if (options && options.search && currentRule() && firstWord(currentRule())) {
      searchSelectedRule();
    }
  }

  function fillEditor() {
    var rule = currentRule();
    if (!rule) {
      $('#currentRuleHeading').text('当前规则');
      $('#keywordInput, #lowCommentInput, #lowWorthyInput, #minPriceInput, #maxPriceInput').val('');
      setFilterWordsInEditor([]);
      $('#enabledInput').prop('checked', false);
      fillTickEditor(productConfig.tickTime || 10800);
      $('#satisfyNumInput').val(productConfig.satisfyNum || 5);
      updateCurrentRuleOverview('待搜索', true);
      updateSwitchLabels();
      return;
    }
    $('#currentRuleHeading').text('当前规则 · ' + firstWord(rule));
    $('#keywordInput').val(firstWord(rule));
    setFilterWordsInEditor(rule.filterWords);
    $('#lowCommentInput').val(rule.lowCommentNum || '');
    $('#lowWorthyInput').val(rule.lowWorthyNum || '');
    $('#minPriceInput').val(rule.minPrice || '');
    $('#maxPriceInput').val(rule.maxPrice || '');
    $('#enabledInput').prop('checked', !!rule.enabled);
    fillTickEditor(productConfig.tickTime || 10800);
    $('#satisfyNumInput').val(productConfig.satisfyNum || 5);
    updateCurrentRuleOverview('待搜索', true);
    updateSwitchLabels();
  }

  function updateCurrentRuleOverview(state, pending) {
    var keyword = ($('#keywordInput').val() || '').trim();
    $('#currentRuleHeading').text(keyword ? '当前规则 · ' + keyword : '当前规则');
    $('#ruleAutoState').text(state || '待搜索').toggleClass('is-pending', !!pending).toggleClass('is-searching', state === '搜索中');
    if (pending) {
      $('#ruleSearchSummary').text('等待搜索');
    }
  }

  function syncEditorToRule() {
    if (selectedRuleIndex < 0 || selectedRuleIndex >= productConfig.keywordRules.length) {
      productConfig.tickTime = readTickSeconds() || productConfig.tickTime || 10800;
      productConfig.satisfyNum = toInt($('#satisfyNumInput').val()) || productConfig.satisfyNum || 5;
      return;
    }
    productConfig.keywordRules[selectedRuleIndex] = currentRuleFromEditor();
    productConfig.tickTime = readTickSeconds() || 10800;
    productConfig.satisfyNum = toInt($('#satisfyNumInput').val()) || 5;
  }

  function currentRuleFromEditor() {
    var previous = currentRule() || {};
    var rule = normalizeRule({
      enabled: previous.enabled !== false,
      words: textToList($('#keywordInput').val()).slice(0, 1),
      filterWords: getFilterWordsFromEditor(),
      lowCommentNum: toInt($('#lowCommentInput').val()),
      lowWorthyNum: toInt($('#lowWorthyInput').val()),
      minPrice: toFloat($('#minPriceInput').val()),
      maxPrice: toFloat($('#maxPriceInput').val())
    });
    if (previous.previewPic) {
      rule.previewPic = previous.previewPic;
    }
    return rule;
  }

  function searchSelectedRule() {
    syncEditorToRule();
    var rule = currentRule();
    if (!rule || !firstWord(rule)) {
      layer.msg('关键词不能为空');
      return;
    }
    setSearchLoading(true, '#searchRule', '搜索预览', '搜索中');
    $('#previewMeta').text('搜索中');
    updateCurrentRuleOverview('搜索中', true);
    $('#ruleSearchSummary').text('正在验证当前规则');
    $.ajax({
      url: BASE_URL + '/productSearch',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify({ rule: rule, limit: 24 }),
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        renderPreview(res.data || {});
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
        $('#previewMeta').text('搜索失败');
        updateCurrentRuleOverview('搜索失败', true);
        $('#ruleSearchSummary').text('搜索失败');
      },
      complete: function() {
        setSearchLoading(false, '#searchRule', '搜索预览', '搜索中');
      }
    });
  }

  function searchAllRules() {
    syncEditorToRule();
    var rules = productConfig.keywordRules.map(normalizeRule).filter(function(rule){
      return rule.enabled !== false && firstWord(rule);
    });
    if (!rules.length) {
      layer.msg('没有可搜索的已启用关键词');
      return;
    }
    setSearchLoading(true, '#searchAllRules', '全局搜索', '搜索中');
    $('#previewMeta').text('全局搜索中 · ' + rules.length + ' 条规则');
    updateCurrentRuleOverview('搜索中', true);
    var remaining = rules.length;
    var results = [];
    rules.forEach(function(rule, index){
      $.ajax({
        url: BASE_URL + '/productSearch',
        contentType: 'application/json;charset=utf-8',
        data: JSON.stringify({ rule: rule, limit: 8 }),
        dataType: 'json',
        type: 'POST',
        success: function(res) {
          results.push({ rule: rule, index: index, data: res.data || {} });
        },
        error: function(xhr) {
          results.push({ rule: rule, index: index, error: readError(xhr) });
        },
        complete: function() {
          remaining -= 1;
          if (remaining === 0) {
            results.sort(function(a, b){ return a.index - b.index; });
            renderGlobalPreview(results);
            setSearchLoading(false, '#searchAllRules', '全局搜索', '搜索中');
          }
        }
      });
    });
  }

  function renderPreview(data) {
    var items = data.items || [];
    dashboardStats.matched = items.length;
    renderDashboardStats();
    previewOpenUrl = data.openUrl || keywordSearchUrl(data.keyword || firstWord(currentRule()));
    $('#previewMeta').text((data.keyword || '') + ' · ' + items.length + ' 条结果');
    updateCurrentRuleOverview('已自动搜索', false);
    $('#ruleSearchSummary').text('共 ' + items.length + ' 条 · ' + items.length + ' 条符合当前规则');
    if (!items.length) {
      setImage($('#previewImage'), previewPlaceholder);
      $('#previewImage').attr('alt', '');
      $('#previewTitle').text('暂无结果');
      $('#previewMetrics').empty();
      renderEmptyPreview('暂无匹配结果', '调整过滤词, 评论, 值率或价格范围后再搜索。');
      return;
    }
    var first = items[0];
    setImage($('#previewImage'), first.pic || previewPlaceholder);
    $('#previewImage').attr('alt', first.title || '商品图片');
    $('#previewTitle').text(first.title || '未命名商品');
    $('#previewMetrics').html('<span>价格 ' + escapeHtml(first.price || '-') + '</span><span>值率 ' + escapeHtml(first.worthy || '0') + '%</span><span>评论 ' + escapeHtml(first.comment || '0') + '</span>');
    if (currentRule()) {
      currentRule().previewPic = first.pic || '';
      renderRules();
    }
    var body = $('#previewCards');
    body.empty();
    body.toggleClass('is-scrollable', items.length > 6);
    items.forEach(function(item){
      body.append(productCard(item));
    });
  }

  function renderGlobalPreview(results) {
    var items = [];
    var seen = {};
    var failed = 0;
    results.forEach(function(result){
      if (result.error) {
        failed += 1;
        return;
      }
      var keyword = firstWord(result.rule);
      var list = result.data.items || [];
      list.forEach(function(item){
        var key = item.url || item.title || JSON.stringify(item);
        if (seen[key]) { return; }
        seen[key] = true;
        item.keyword = keyword;
        items.push(item);
      });
    });
    var first = items[0];
    dashboardStats.scanned = results.length;
    dashboardStats.matched = items.length;
    renderDashboardStats();
    previewOpenUrl = first && first.keyword ? keywordSearchUrl(first.keyword) : '';
    $('#previewMeta').text('全局搜索 · ' + results.length + ' 条规则 · ' + items.length + ' 条结果' + (failed ? ' · ' + failed + ' 条失败' : ''));
    $('#ruleAutoState').text('已自动搜索').removeClass('is-pending is-searching');
    $('#ruleSearchSummary').text('全局搜索 ' + results.length + ' 条规则 · 共 ' + items.length + ' 条结果');
    if (!items.length) {
      setImage($('#previewImage'), previewPlaceholder);
      $('#previewImage').attr('alt', '');
      $('#previewTitle').text('暂无结果');
      $('#previewMetrics').empty();
      renderEmptyPreview('暂无匹配结果', '调整过滤词, 评论, 值率或价格范围后再搜索。');
      return;
    }
    setImage($('#previewImage'), first.pic || previewPlaceholder);
    $('#previewImage').attr('alt', first.title || '商品图片');
    $('#previewTitle').text(first.title || '未命名商品');
    $('#previewMetrics').html('<span>来自 ' + escapeHtml(first.keyword || '-') + '</span><span>价格 ' + escapeHtml(first.price || '-') + '</span><span>值率 ' + escapeHtml(first.worthy || '0') + '%</span><span>评论 ' + escapeHtml(first.comment || '0') + '</span>');
    var body = $('#previewCards');
    body.empty();
    body.toggleClass('is-scrollable', items.length > 6);
    items.forEach(function(item){
      body.append(productCard(item));
    });
  }

  function hydrateRuleThumbnails() {
    productConfig.keywordRules.forEach(function(rule, index){
      if (!firstWord(rule) || rule.previewPic) {
        return;
      }
      $.ajax({
        url: BASE_URL + '/productSearch',
        contentType: 'application/json;charset=utf-8',
        data: JSON.stringify({ rule: rule, limit: 1 }),
        dataType: 'json',
        type: 'POST',
        success: function(res) {
          var item = res.data && res.data.items && res.data.items[0];
          if (item && item.pic) {
            productConfig.keywordRules[index].previewPic = item.pic;
            renderRules();
          }
        }
      });
    });
  }

  function removeSelectedRule() {
    if (selectedRuleIndex < 0) { return; }
    productConfig.keywordRules.splice(selectedRuleIndex, 1);
    selectedRuleIndex = Math.min(selectedRuleIndex, productConfig.keywordRules.length - 1);
    renderRules();
    fillEditor();
    clearPreview();
  }

  function fillNotifyForm() {
    $('#telegramEnabled').prop('checked', !!productConfig.telegram.enabled);
    $('#telegramBotToken').val(productConfig.telegram.botToken || '');
    $('#telegramChatId').val(productConfig.telegram.chatId || '');
    $('#telegramParseMode').val(productConfig.telegram.parseMode || 'HTML');
    $('#telegramDisablePreview').prop('checked', !!productConfig.telegram.disableWebPagePreview);
    telegramHealthTested = false;
    refreshTelegramAvatar();
    updateSwitchLabels();
  }

  function readNotifyForm() {
    productConfig.telegram = {
      enabled: $('#telegramEnabled').is(':checked'),
      botToken: ($('#telegramBotToken').val() || '').trim(),
      chatId: ($('#telegramChatId').val() || '').trim(),
      parseMode: $('#telegramParseMode').val() || 'HTML',
      disableWebPagePreview: $('#telegramDisablePreview').is(':checked')
    };
  }

  function updateSwitchLabels() {
    var botOn = $('#telegramEnabled').is(':checked');
    var previewOff = $('#telegramDisablePreview').is(':checked');
    $('.app-shell').toggleClass('tg-on', botOn);
    $('.notify-enabled-toggle').attr('title', botOn ? 'Telegram 已启用' : 'Telegram 未启用')
      .attr('aria-label', botOn ? 'Telegram 已启用' : 'Telegram 未启用');
    $('#topTelegramToggle')
      .toggleClass('is-on', botOn)
      .toggleClass('off', !botOn)
      .attr('title', botOn ? 'Telegram 已启用' : 'Telegram 未启用')
      .attr('aria-label', botOn ? 'Telegram 已启用' : 'Telegram 未启用')
      .attr('aria-pressed', botOn ? 'true' : 'false')
      .find('.sr-only').text(botOn ? 'Telegram 已启用' : 'Telegram 未启用');
    $('.setting-copy strong').text(previewOff ? '隐藏预览' : '网页预览');
    $('.setting-copy small').text(previewOff ? '纯文本链接' : '保留预览');
    updateTelegramHealth();
  }

  function telegramFormState() {
    return {
      configured: !!(($('#telegramBotToken').val() || '').trim() && ($('#telegramChatId').val() || '').trim()),
      enabled: $('#telegramEnabled').is(':checked'),
      parseMode: $('#telegramParseMode').val() || 'HTML'
    };
  }

  function updateTelegramHealth() {
    var state = telegramFormState();
    var ready = state.configured && (state.enabled || telegramHealthTested);
    $('#telegramHealthCard').toggleClass('is-ready', ready);
    if (!state.configured) {
      $('#telegramHealthTitle').text('未配置');
      $('#telegramHealthMeta').text('填写 Bot Token 与 Chat ID');
      $('#telegramHealthState').text('未配置');
      return;
    }
    $('#telegramHealthTitle').text(telegramHealthTested ? '测试成功' : '配置完成');
    $('#telegramHealthMeta').text((telegramHealthTested ? '刚刚 · ' : '') + state.parseMode + ' 模式');
    $('#telegramHealthState').text(ready ? '可推送' : '未启用');
  }

  function showTelegramOfficialAvatar() {
    $('#telegramAccountAvatar').prop('hidden', true).removeAttr('src');
    $('#telegramOfficialAvatar').prop('hidden', false);
  }

  function refreshTelegramAvatar() {
    var state = telegramFormState();
    if (!state.configured) {
      showTelegramOfficialAvatar();
      return;
    }
    var avatar = $('#telegramAccountAvatar');
    avatar.off('load.telegramAvatar error.telegramAvatar');
    avatar.on('load.telegramAvatar', function(){
      $('#telegramOfficialAvatar').prop('hidden', true);
      avatar.prop('hidden', false);
    });
    avatar.on('error.telegramAvatar', showTelegramOfficialAvatar);
    avatar.prop('hidden', true).attr('src', BASE_URL + '/telegramAvatar?v=' + Date.now());
  }

  function testTelegram() {
    readNotifyForm();
    var btn = $('#testTelegram');
    btn.prop('disabled', true).addClass('loading');
    $.ajax({
      url: BASE_URL + '/telegramTest',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify({ telegram: productConfig.telegram }),
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        telegramHealthTested = true;
        updateTelegramHealth();
        layer.msg(res.msg || '测试发送成功');
        loadPushLogs();
      },
      error: function(xhr) {
        telegramHealthTested = false;
        updateTelegramHealth();
        layer.msg(readError(xhr));
        loadPushLogs();
      },
      complete: function() {
        btn.prop('disabled', false).removeClass('loading');
      }
    });
  }

  function loadPushLogs() {
    $.ajax({
      url: BASE_URL + '/pushLogs',
      dataType: 'json',
      type: 'GET',
      success: function(res) {
        renderPushLogs(res.data || []);
      },
      error: function() {
        renderPushLogs([]);
      }
    });
  }

  function renderPushLogs(logs) {
    var list = $('#pushLogList');
    list.empty();
    dashboardStats.pushed = logs.filter(function(log){ return (log.status || 'success') === 'success'; }).length;
    dashboardStats.failed = logs.filter(function(log){ return log.status === 'fail'; }).length;
    renderDashboardStats();
    if (!logs.length) {
      list.append(pushLogCard({
        title: '暂无推送记录',
        status: 'skip',
        reason: '测试发送或商品命中后会显示在这里',
        image: 'https://www.smzdm.com/favicon.ico',
        time: '待触发'
      }));
      return;
    }
    logs.forEach(function(log){
      list.append(pushLogCard(log));
    });
  }

  function pushLogCard(log) {
    log = log || {};
    var status = log.status || 'success';
    var card = $('<article class="push-log-item"></article>');
    var thumb = $('<div class="push-log-thumb"></div>');
    var image = $('<img loading="lazy" decoding="async" alt="">');
    image.on('error', function(){
      this.onerror = null;
      this.src = placeholderImage(log.title || '推');
    });
    image.attr('src', proxiedImageUrl(log.image || 'https://www.smzdm.com/favicon.ico'));
    thumb.append(image);
    var content = $('<div></div>');
    content.append('<div class="push-log-title">' + escapeHtml(log.title || 'Telegram 通知') + '</div>');
    content.append('<div class="push-log-meta"><span>' + escapeHtml(log.time || '-') + '</span><span>' + escapeHtml(log.reason || statusLabel(status)) + '</span></div>');
    var state = $('<span class="push-log-state ' + escapeAttr(status) + '">' + escapeHtml(statusLabel(status)) + '</span>');
    card.append(thumb);
    card.append(content);
    card.append(state);
    return card;
  }

  function statusLabel(status) {
    if (status === 'fail') { return '推送失败'; }
    if (status === 'pending' || status === 'skip') { return '未推送'; }
    return '已推送';
  }

  function markConfigDirty() {
    setTopIconState('#topSaveStatus', '有未保存更改', 'dirty');
  }

  function markConfigSaved() {
    setTopIconState('#topSaveStatus', '已保存', 'ok');
  }

  function setTopIconState(selector, label, state) {
    var item = $(selector);
    item.attr('title', label).attr('aria-label', label);
    item.removeClass('ok dirty off');
    if (state) {
      item.addClass(state);
    }
    item.find('.sr-only').text(label);
  }

  function clearPreview() {
    previewOpenUrl = '';
    $('#previewMeta').text('等待搜索');
    updateCurrentRuleOverview('待搜索', true);
    setImage($('#previewImage'), currentRule() && currentRule().previewPic ? currentRule().previewPic : previewPlaceholder);
    $('#previewImage').attr('alt', currentRule() ? (firstWord(currentRule()) || '') : '');
    $('#previewTitle').text(currentRule() ? (firstWord(currentRule()) || '暂无结果') : '暂无结果');
    $('#previewMetrics').empty();
    renderEmptyPreview('暂无搜索结果', '等待搜索');
  }

  function normalizeConfig(value) {
    value = value || {};
    value.telegram = value.telegram || {};
    var rules = (value.keywordRules || []).map(normalizeRule).filter(function(rule){ return firstWord(rule); });
    if (!rules.length && (value.keyWords || []).length) {
      rules = (value.keyWords || []).map(function(word){
        return normalizeRule({
          enabled: true,
          words: [word],
          filterWords: value.filterWords || [],
          lowCommentNum: value.lowCommentNum || 0,
          lowWorthyNum: value.lowWorthyNum || 0,
          minPrice: value.minPrice || 0,
          maxPrice: value.maxPrice || 0
        });
      });
    }
    return {
      keyWords: flattenKeywords(rules),
      filterWords: value.filterWords || [],
      lowCommentNum: value.lowCommentNum || 0,
      lowWorthyNum: value.lowWorthyNum || 0,
      minPrice: value.minPrice || 0,
      maxPrice: value.maxPrice || 0,
      satisfyNum: value.satisfyNum || 5,
      tickTime: value.tickTime || 10800,
      cron: value.cron || '0 10 10 ? * *',
      telegram: {
        enabled: !!value.telegram.enabled,
        botToken: value.telegram.botToken || '',
        chatId: value.telegram.chatId || '',
        parseMode: value.telegram.parseMode || 'HTML',
        disableWebPagePreview: !!value.telegram.disableWebPagePreview
      },
      keywordRules: rules
    };
  }

  function normalizeRule(rule) {
    rule = rule || {};
    return {
      enabled: rule.enabled !== false,
      words: textToList((rule.words || []).join ? (rule.words || []).join('\n') : rule.words).slice(0, 1),
      filterWords: textToList((rule.filterWords || []).join ? (rule.filterWords || []).join('\n') : rule.filterWords),
      lowCommentNum: toInt(rule.lowCommentNum),
      lowWorthyNum: toInt(rule.lowWorthyNum),
      minPrice: toFloat(rule.minPrice),
      maxPrice: toFloat(rule.maxPrice),
      previewPic: rule.previewPic || ''
    };
  }

  function emptyRule() {
    return normalizeRule({ enabled: true, words: [''], filterWords: [], lowCommentNum: 0, lowWorthyNum: 0, minPrice: 0, maxPrice: 0 });
  }

  function currentRule() {
    return selectedRuleIndex >= 0 ? productConfig.keywordRules[selectedRuleIndex] : null;
  }

  function firstWord(rule) {
    return rule && rule.words && rule.words.length ? rule.words[0] : '';
  }

  function flattenKeywords(rules) {
    return (rules || []).map(firstWord).filter(function(word, index, list){ return word && list.indexOf(word) === index; });
  }

  function renderSummary() {
    var rules = productConfig.keywordRules || [];
    var enabled = rules.filter(function(rule){ return rule.enabled !== false && firstWord(rule); }).length;
    var filters = [];
    rules.forEach(function(rule){
      filters = filters.concat(rule.filterWords || []);
    });
    $('#rulesMeta').text('规则 ' + rules.length + ' · 启用 ' + enabled + ' · 过滤词 ' + textToList(filters).length);
    $('#topRuleStatus').text('规则 ' + rules.length + ' / 启用 ' + enabled);
    dashboardStats.scanned = enabled;
    renderDashboardStats();
  }

  function renderDashboardStats() {
    $('#dashboardScanned').text(formatNumber(dashboardStats.scanned));
    $('#dashboardMatched').text(formatNumber(dashboardStats.matched));
    $('#dashboardPushed').text(formatNumber(dashboardStats.pushed));
    $('#dashboardFailed').text(formatNumber(dashboardStats.failed));
  }

  function listToText(list) {
    return (list || []).join('\n');
  }

  function textToList(text) {
    if (Array.isArray(text)) {
      text = text.join('\n');
    }
    return (text || '').split(/[\n,，\t\r]+/).map(function(item){
      return item.trim();
    }).filter(function(item, index, list){
      return item && list.indexOf(item) === index;
    });
  }

  function toInt(value) {
    var parsed = parseInt(value, 10);
    return isNaN(parsed) || parsed < 0 ? 0 : parsed;
  }

  function toFloat(value) {
    var parsed = parseFloat(value);
    return isNaN(parsed) || parsed < 0 ? 0 : parsed;
  }

  function formatNumber(value) {
    return value ? String(value) : '0';
  }

  function priceRange(rule) {
    var min = toFloat(rule.minPrice);
    var max = toFloat(rule.maxPrice);
    if (!min && !max) { return '不限'; }
    if (min && max) { return formatPlainPrice(min) + '-' + formatPlainPrice(max); }
    if (min) { return '≥' + formatPlainPrice(min); }
    return '≤' + formatPlainPrice(max);
  }

  function formatPlainPrice(value) {
    var text = String(value);
    if (text.indexOf('.') >= 0) {
      text = text.replace(/0+$/, '').replace(/\.$/, '');
    }
    return text;
  }

  function renderTags(list) {
    if (!list || !list.length) { return '<span class="tag off">无</span>'; }
    return list.map(function(item){ return '<span class="tag warn">' + escapeHtml(item) + '</span>'; }).join('');
  }

  function statusSwitch(enabled) {
    var label = enabled ? '关闭规则' : '启用规则';
    return '<button type="button" class="rule-enabled-switch' + (enabled ? ' is-on' : '') + '" role="switch" aria-checked="' + (enabled ? 'true' : 'false') + '" title="' + label + '" aria-label="' + label + '"><span class="switch-knob"></span></button>';
  }

  function fillTickEditor(seconds) {
    seconds = toInt(seconds) || 10800;
    var unit = 1;
    if (seconds % 3600 === 0) {
      unit = 3600;
    } else if (seconds % 60 === 0) {
      unit = 60;
    }
    $('#tickUnitInput').val(String(unit));
    $('#tickValueInput').val(seconds / unit);
  }

  function readTickSeconds() {
    var value = toFloat($('#tickValueInput').val());
    if (value <= 0) {
      return 0;
    }
    var unit = toInt($('#tickUnitInput').val()) || 1;
    return Math.max(60, Math.round(value * unit));
  }

  function setSearchLoading(loading, selector, idleText, loadingText) {
    var btn = $(selector || '#searchRule');
    var label = loading ? (loadingText || '搜索中') : (idleText || '搜索预览');
    if (selector === '#searchRule') {
      btn.removeClass('loading').prop('disabled', !!loading);
      btn.attr('aria-busy', loading ? 'true' : 'false');
      return;
    }
    btn.toggleClass('loading', !!loading);
    btn.prop('disabled', !!loading);
    if (btn.hasClass('icon-btn')) {
      btn.attr('aria-label', label).attr('title', label);
      btn.find('.sr-only').text(label);
      return;
    }
    var visibleLabel = btn.children('span').not('.sr-only').last();
    if (visibleLabel.length) {
      btn.attr('aria-label', label).attr('title', label);
      visibleLabel.text(loading ? (loadingText || '搜索中') : (idleText || '预览'));
      return;
    }
    btn.text(label);
  }

  function setImage(target, src) {
    target.attr('src', proxiedImageUrl(src));
  }

  function renderEmptyPreview(title, message) {
    $('#previewCards').removeClass('is-scrollable').html('<div class="empty-state">' + emptyStateSvg() + '<strong>' + escapeHtml(title) + '</strong><p>' + escapeHtml(message) + '</p></div>');
  }

  function productCard(item) {
    item = item || {};
    var card = $('<article class="product-card"></article>');
    var image = $('<img loading="lazy" decoding="async">');
    var media = $('<div class="product-media media-square"></div>').append(image);
    image.attr('alt', item.title || '商品图片');
    image.on('load', function(){
      classifyProductMedia(media, this);
    });
    image.on('error', function(){
      this.onerror = null;
      media.removeClass('media-wide media-tall').addClass('media-square');
      this.src = placeholderImage(item.title || '商');
    });
    image.attr('src', item.pic ? proxiedImageUrl(item.pic) : placeholderImage(item.title || '商'));
    var info = $('<div class="product-info"></div>');
    info.append('<a class="product-title" target="_blank" rel="noopener" href="' + escapeAttr(item.url || '#') + '">' + escapeHtml(item.title || '未命名商品') + '</a>');
    var priceParts = splitPriceText(item.price || '-');
    var priceHtml = '<div class="product-price-row"><span class="price-currency">￥</span><span class="price-main">' + escapeHtml(priceParts.main) + '</span>';
    if (priceParts.condition) {
      priceHtml += '<span class="price-condition">' + escapeHtml(priceParts.condition) + '</span>';
    }
    priceHtml += '</div>';
    info.append(priceHtml);
    info.append('<div class="product-meta"><span class="tag">' + iconSvg('worthy') + escapeHtml(item.worthy || '0') + '%</span><span class="tag">' + iconSvg('comment') + escapeHtml(item.comment || '0') + '</span><span class="product-time">' + escapeHtml(formatUpdateTime(item.date)) + '</span></div>');
    card.append(media);
    card.append(info);
    return card;
  }

  function classifyProductMedia(media, img) {
    var width = img && img.naturalWidth ? img.naturalWidth : 1;
    var height = img && img.naturalHeight ? img.naturalHeight : 1;
    var ratio = width / height;
    media.removeClass('media-wide media-tall media-square');
    if (ratio >= 1.28) {
      media.addClass('media-wide');
    } else if (ratio <= 0.78) {
      media.addClass('media-tall');
    } else {
      media.addClass('media-square');
    }
  }

  function splitPriceText(value) {
    var text = String(value || '-').replace(/^\s*￥\s*/, '').trim();
    if (!text || text === '-') {
      return { main: '-', condition: '' };
    }
    var match = text.match(/^([^（(]+)\s*[（(](.+)[）)]\s*$/);
    if (match) {
      return { main: match[1].trim(), condition: match[2].trim() };
    }
    match = text.match(/^(.+?)(返.+|需用券.*|用券.*|券后.*|淘金币.*|低至.*)$/);
    if (match) {
      return { main: match[1].trim(), condition: match[2].trim() };
    }
    return { main: text, condition: '' };
  }

  function formatUpdateTime(value) {
    var text = String(value || '').trim();
    if (!text) {
      return '时间未知';
    }
    var date = null;
    var timestampText = text.replace(/^\+/, '');
    if (/^\d{10,13}$/.test(timestampText)) {
      var timestamp = Number(timestampText);
      date = new Date(timestampText.length === 10 ? timestamp * 1000 : timestamp);
    } else {
      var parsed = Date.parse(text.replace(/-/g, '/'));
      if (!isNaN(parsed)) {
        date = new Date(parsed);
      }
    }
    if (!date || isNaN(date.getTime())) {
      return text;
    }
    return String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
  }

  function proxiedImageUrl(src) {
    src = (src || '').trim();
    if (!src) { return previewPlaceholder; }
    if (src.indexOf('data:') === 0 || src.indexOf('/imageProxy') === 0) { return src; }
    try {
      var imageUrl = new URL(src, window.location.href);
      if (imageUrl.origin === window.location.origin && imageUrl.pathname === '/imageProxy') {
        return imageUrl.href;
      }
      if (imageUrl.protocol !== 'http:' && imageUrl.protocol !== 'https:') {
        return src;
      }
      return BASE_URL + '/imageProxy?url=' + encodeURIComponent(imageUrl.href);
    } catch (e) {
      return src;
    }
  }

  function emptyStateSvg() {
    return '<svg viewBox="0 0 96 96" fill="none" aria-hidden="true"><rect x="18" y="22" width="46" height="38" rx="10" fill="#f0f0f2" stroke="#d2d2d7"/><path d="M30 39h22M30 49h14" stroke="#a1a1a6" stroke-width="4" stroke-linecap="round"/><circle cx="61" cy="60" r="13" fill="#fff" stroke="#b7b7bd" stroke-width="5"/><path d="M72 71l9 9" stroke="#b7b7bd" stroke-width="6" stroke-linecap="round"/></svg>';
  }

  function keywordSearchUrl(keyword) {
    keyword = (keyword || '').trim();
    return keyword ? 'https://search.smzdm.com/?c=faxian&s=' + encodeURIComponent(keyword) : '';
  }

  function button(text, cls, handler) {
    var btn = $('<button type="button" class="btn ' + cls + '"></button>').text(text);
    btn.on('click', handler);
    return btn;
  }

  function iconButton(icon, label, cls, handler) {
    var btn = $('<button type="button" class="btn ' + cls + '" aria-label="' + escapeAttr(label) + '" title="' + escapeAttr(label) + '"></button>');
    btn.html(iconSvg(icon) + '<span class="sr-only">' + escapeHtml(label) + '</span>');
    btn.on('click', handler);
    return btn;
  }

  function iconSvg(name) {
    if (name === 'trash') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>';
    }
    if (name === 'plus') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>';
    }
    if (name === 'refresh') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12a9 9 0 0 1 15.5-6.2"/><path d="M18 3v5h-5"/><path d="M6 21v-5h5"/></svg>';
    }
    if (name === 'save') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>';
    }
    if (name === 'copy') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="8" y="8" width="11" height="11" rx="2"/><path d="M5 16H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    }
    if (name === 'external') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>';
    }
    if (name === 'comment') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-8l-5 3v-3H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/><circle cx="9" cy="11" r="1.1" fill="currentColor" stroke="none"/><circle cx="15" cy="11" r="1.1" fill="currentColor" stroke="none"/></svg>';
    }
    if (name === 'worthy') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3.4 2.55 5.16 5.7.83-4.12 4.02.97 5.68L12 16.41l-5.1 2.68.97-5.68-4.12-4.02 5.7-.83L12 3.4Z"/></svg>';
    }
    if (name === 'price') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.5 4 12 12l5.5-8"/><path d="M12 12v8"/><path d="M8 12h8"/><path d="M8 16h8"/></svg>';
    }
    if (name === 'enabled') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l4 4L19 6"/></svg>';
    }
    if (name === 'paused') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7v10"/><path d="M16 7v10"/></svg>';
    }
    if (name === 'sun') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M4.93 19.07l1.41-1.41"/><path d="M17.66 6.34l1.41-1.41"/></svg>';
    }
    if (name === 'moon') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5 7 7 0 1 0 20.5 14.5Z"/></svg>';
    }
    if (name === 'auto') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-14.9 6.8"/><path d="M3 12A9 9 0 0 1 17.9 5.2"/><path d="M18 3v5h-5"/><path d="M6 21v-5h5"/></svg>';
    }
    if (name === 'x') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>';
    }
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>';
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch){
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
    });
  }

  function escapeAttr(value) {
    return escapeHtml(value || '#');
  }

  function readError(xhr) {
    try {
      return JSON.parse(xhr.responseText).msg || '请求失败';
    } catch (e) {
      return '请求失败';
    }
  }
});
</script>
</body>
</html>
