    .preview-hero {

      -webkit-box-orient: vertical;

      font-size: 14px;
      font-weight: 600;
      line-height: 1.36;

    .product-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .product-price { color: var(--text); font-weight: 600; white-space: nowrap; }
    .product-source { margin-top: 6px; color: var(--muted); font-size: 12px; }
    .product-action { justify-self: end; white-space: nowrap; }
    .title-link { color: var(--text); text-decoration: none; font-weight: 650; }
    .title-link:hover { color: var(--blue); }
    .bottom-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
    .editor-actions { justify-content: space-between; }
    .empty { color: var(--muted); font-size: 13px; padding: 18px; text-align: center; }
    .empty-state {
      display: grid;
      place-items: center;
      gap: 8px;
      min-height: 198px;
      color: var(--muted);

    .empty-state p { margin: 0; max-width: 310px; line-height: 1.5; }
    .editor-panel .bottom-bar { margin-top: 10px; }
    .notification-shell { min-height: 0; }
    @media (max-width: 1240px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-areas:
          "rules"
          "editor"
          "preview"
          "notify";
      }
    }
    @media (max-width: 720px) {
      .shell { padding: 18px 16px 36px; }
      .grid, .grid.two, .editor-grid, .notify-grid { grid-template-columns: 1fr; }
      .span-2, .span-4 { grid-column: span 1; }
      .editor-grid .half,
      .editor-grid .wide { grid-column: span 1; }
      .section-head { align-items: stretch; flex-direction: column; }
      .header-controls { justify-content: flex-start; }
      .rules-header { display: none; }
      .rule-card {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        align-items: start;
      }
      .rule-main,
      .rule-filter,
      .row-actions { grid-column: 1 / -1; }
      .rule-stat,
      .rule-price {
        justify-self: stretch;
        justify-items: start;
        text-align: left;
      }
      .rule-stat::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 12px;
      }
      .row-actions { justify-content: flex-start; }
      .row-actions .icon-btn {
        width: 44px;
        height: 44px;
        min-width: 44px;
        min-height: 44px;
        max-width: 44px;
        max-height: 44px;
        flex-basis: 44px;
      }
      .preview-hero { grid-template-columns: 1fr; }
      .preview-hero img { width: 100%; height: 180px; }
      .product-list:not(.is-scrollable) { max-height: none; }
      .product-card { grid-template-columns: 76px minmax(0, 1fr); align-items: start; }
      .product-card img { width: 76px; height: 76px; }
      .product-action { grid-column: 1 / -1; justify-self: stretch; }
      .product-action .btn { width: 100%; }
      .bottom-bar { justify-content: stretch; }
      .bottom-bar.editor-actions { justify-content: space-between; }
      .bottom-bar .btn { flex: 1; }
      .bottom-bar .btn.icon-btn { flex: 0 0 44px; }
    }

    /* Dashboard reset: four equal sections, fixed rhythm, system dark mode. */
    :root {
      --page-a: #f7f8fc;
      --page-b: #edf3fa;
      --page-c: #f7f0e5;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-solid: #ffffff;
      --surface-soft: rgba(247, 249, 252, 0.9);
      --surface-raised: rgba(255, 255, 255, 0.96);
      --text: #111827;
      --muted: #667085;
      --muted-2: #98a2b3;
      --line: rgba(17, 24, 39, 0.1);
      --line-strong: rgba(17, 24, 39, 0.18);
      --blue: #007aff;
      --green: #2da44e;
      --amber: #b7791f;
      --red: #d83b2d;
      --violet: #7c3aed;
      --blue-soft: rgba(0, 122, 255, 0.12);
      --green-soft: rgba(45, 164, 78, 0.12);
      --amber-soft: rgba(183, 121, 31, 0.12);
      --red-soft: rgba(216, 59, 45, 0.12);
      --violet-soft: rgba(124, 58, 237, 0.1);
      --radius-panel: 24px;
      --radius-cell: 16px;
      --control: 36px;
      --control-sm: 30px;
      --head-h: 58px;
      --rule-row: 62px;
      --product-row: 62px;
      --shadow-panel: 0 24px 70px rgba(28, 39, 63, 0.14);
      color-scheme: light dark;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --page-a: #101217;
        --page-b: #151a23;
        --page-c: #1a1611;
        --surface: rgba(27, 30, 37, 0.86);
        --surface-solid: #1d2028;
        --surface-soft: rgba(34, 38, 47, 0.86);
        --surface-raised: rgba(37, 41, 50, 0.94);
        --text: #f5f7fb;
        --muted: #aab3c2;
        --muted-2: #768195;
        --line: rgba(255, 255, 255, 0.1);
        --line-strong: rgba(255, 255, 255, 0.2);
        --blue-soft: rgba(10, 132, 255, 0.18);
        --green-soft: rgba(48, 209, 88, 0.14);
        --amber-soft: rgba(255, 159, 10, 0.15);
        --red-soft: rgba(255, 69, 58, 0.14);
        --violet-soft: rgba(191, 90, 242, 0.14);
        --shadow-panel: 0 26px 78px rgba(0, 0, 0, 0.34);
      }
    }
    html {
      background: var(--page-a);
    }
    body {
      min-height: 100dvh;
      background:
        linear-gradient(130deg, rgba(0, 122, 255, 0.12) 0%, transparent 34%),
        linear-gradient(230deg, rgba(45, 164, 78, 0.1) 0%, transparent 30%),
        linear-gradient(180deg, var(--page-a) 0%, var(--page-b) 55%, var(--page-c) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background:
          linear-gradient(130deg, rgba(10, 132, 255, 0.14) 0%, transparent 34%),
          linear-gradient(230deg, rgba(48, 209, 88, 0.08) 0%, transparent 30%),
          linear-gradient(180deg, var(--page-a) 0%, var(--page-b) 58%, var(--page-c) 100%);
      }
    }
    .shell {
      width: min(1540px, calc(100vw - 40px));
      max-width: none;
      min-height: 100dvh;
      margin: 0 auto;
      padding: 20px 0;
      display: grid;
      place-items: center;
    }
    .workspace {
      width: 100%;
      height: min(960px, calc(100dvh - 40px));
      min-height: 780px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      grid-template-areas:
        "rules preview"
        "editor notify";
      gap: 16px;
      align-items: stretch;
    }
    .column-stack {
      display: contents;
    }
    .panel,
    .panel.rules-panel,
    .panel.preview-panel,
    .panel.editor-panel,
    .panel.notification-shell {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-panel);
      background: var(--surface);
      box-shadow: var(--shadow-panel);
      backdrop-filter: blur(26px) saturate(1.18);
    }
    .rules-panel { grid-area: rules; --section: var(--blue); --section-soft: var(--blue-soft); }
    .preview-panel { grid-area: preview; --section: var(--green); --section-soft: var(--green-soft); }
    .editor-panel { grid-area: editor; --section: var(--amber); --section-soft: var(--amber-soft); }
    .notification-shell { grid-area: notify; --section: var(--violet); --section-soft: var(--violet-soft); }

    h2 {

      border: 1px solid var(--line);

      color: var(--text);

    .btn:active {

    .btn.primary,

    .btn.danger {

    .btn svg,

    .row-actions .icon-btn {

    .rules-list {

      gap: 8px;

      gap: 8px;

<script src="https://cdnjs.cloudflare.com/ajax/libs/layui/2.7.6/layui.js"></script>
<script>
var BASE_URL = window.location.origin;
var productConfig = {
  keyWords: [],
  filterWords: [],
  lowCommentNum: 0,
  lowWorthyNum: 0,
  minPrice: 0,
  maxPrice: 0,
  satisfyNum: 5,
  tickTime: 10800,
  cron: '0 10 10 ? * *',
  telegram: { enabled: false, botToken: '', chatId: '', parseMode: 'HTML', disableWebPagePreview: false },
  keywordRules: []
};
var selectedRuleIndex = -1;
var previewOpenUrl = '';
var filterEditorWords = [];
var previewPlaceholder = placeholderImage('商');

function placeholderImage(label) {
  var text = String(label || '商').trim().slice(0, 1) || '商';
  text = text.replace(/[&<>]/g, function(ch){ return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[ch]; });
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">' +
    '<rect width="240" height="240" rx="22" fill="#eef3f9"/>' +
    '<rect x="1" y="1" width="238" height="238" rx="21" fill="none" stroke="#dbe3ee" stroke-width="2"/>' +
    '<text x="120" y="132" dominant-baseline="middle" text-anchor="middle" fill="#65748a" font-family="Arial, sans-serif" font-size="76" font-weight="700">' + text + '</text>' +
    '</svg>';
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

layui.use(function(){
  var layer = layui.layer;
  var $ = layui.jquery;

  $('#reloadProductConfig').on('click', loadProductConfig);
  $('#addRule').on('click', function(){
    syncEditorToRule();
    productConfig.keywordRules.push(emptyRule());
    selectRule(productConfig.keywordRules.length - 1);
    renderRules();
  });
  $('#searchAllRules').on('click', searchAllRules);
  $('#duplicateRule').on('click', function(){
    if (!currentRule()) { return; }
    syncEditorToRule();
    var copy = normalizeRule(JSON.parse(JSON.stringify(currentRule())));
    copy.words = [(copy.words[0] || '') + ' 副本'];
    delete copy.previewPic;
    productConfig.keywordRules.splice(selectedRuleIndex + 1, 0, copy);
    selectRule(selectedRuleIndex + 1);
    renderRules();
  });
  $('#removeRule').on('click', removeSelectedRule);
  $('#saveProductConfig, #saveNotifyConfig').on('click', saveProductConfig);
  $('#searchRule').on('click', searchSelectedRule);
  $('#openSearchPage').on('click', function(){
    var rule = currentRuleFromEditor();
    var keyword = firstWord(rule);
    var url = previewOpenUrl || keywordSearchUrl(keyword);
    if (url) {
      window.open(url, '_blank', 'noopener');
    }
  });
  bindFilterTokenEditor();
  $('#keywordInput, #lowCommentInput, #lowWorthyInput, #minPriceInput, #maxPriceInput, #enabledInput, #tickValueInput, #tickUnitInput, #satisfyNumInput').on('input change', function(){
    syncEditorToRule();
    updateSwitchLabels();
    renderRules();
    markConfigDirty();
  });
  $('#telegramEnabled, #telegramDisablePreview').on('change', updateSwitchLabels);
  $('#previewImage').on('error', function(){
    this.onerror = null;
    this.src = previewPlaceholder;
  });

  loadProductConfig();

  function loadProductConfig() {
    $.ajax({
      url: BASE_URL + '/productConfig',
      dataType: 'json',
      type: 'GET',
      success: function(res) {
        productConfig = normalizeConfig(res.data);
        fillNotifyForm();
        renderRules();
        renderSummary();
        selectRule(productConfig.keywordRules.length ? 0 : -1);
        hydrateRuleThumbnails();
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  }

  function bindFilterTokenEditor() {
    $('#filterTokenBox').on('click', function(){
      $('#filterInput').trigger('focus');
    });
    $('#filterInput').on('keydown', function(e){
      if (e.key === 'Enter' || e.key === ',' || e.key === '，' || e.key === 'Tab') {
        if (($(this).val() || '').trim()) {
          e.preventDefault();
          addFilterWords($(this).val());
        }
        return;
      }
      if (e.key === 'Backspace' && !$(this).val() && filterEditorWords.length) {
        e.preventDefault();
        removeFilterWord(filterEditorWords.length - 1);
      }
    });
    $('#filterInput').on('paste', function(e){
      var clipboard = e.originalEvent && e.originalEvent.clipboardData;
      var text = clipboard ? clipboard.getData('text') : '';
      if (/[\n,，\t\r]+/.test(text)) {
        e.preventDefault();
        addFilterWords(text);
      }
    });
    $('#filterInput').on('blur', function(){
      commitFilterInput();
    });
  }

  function setFilterWordsInEditor(list) {
    filterEditorWords = textToList(list);
    $('#filterInput').val('');
    renderFilterTokens();
  }

  function getFilterWordsFromEditor() {
    return textToList(filterEditorWords.concat(textToList($('#filterInput').val())));
  }

  function addFilterWords(value) {
    var words = textToList(value);
    if (!words.length) { return; }
    filterEditorWords = textToList(filterEditorWords.concat(words));
    $('#filterInput').val('');
    renderFilterTokens();
    syncEditorToRule();
    renderRules();
  }

  function removeFilterWord(index) {
    if (index < 0 || index >= filterEditorWords.length) { return; }
    filterEditorWords.splice(index, 1);
    renderFilterTokens();
    syncEditorToRule();
    renderRules();
  }

  function commitFilterInput() {
    if (($('#filterInput').val() || '').trim()) {
      addFilterWords($('#filterInput').val());
    } else {
      renderFilterTokens();
    }
  }

  function renderFilterTokens() {
    var input = $('#filterInput');
    $('#filterTokenBox .filter-token').remove();
    filterEditorWords.forEach(function(word, index){
      var chip = $('<span class="filter-token"></span>');
      chip.append('<span title="' + escapeAttr(word) + '">' + escapeHtml(word) + '</span>');
      var remove = $('<button type="button" aria-label="删除过滤词 ' + escapeAttr(word) + '" title="删除"></button>');
      remove.html(iconSvg('x'));
      remove.on('mousedown', function(e){ e.preventDefault(); });
      remove.on('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        removeFilterWord(index);
        input.trigger('focus');
      });
      chip.append(remove);
      input.before(chip);
    });
  }

  function saveProductConfig() {
    syncEditorToRule();
    readNotifyForm();
    productConfig.keyWords = flattenKeywords(productConfig.keywordRules);
    $.ajax({
      url: BASE_URL + '/productConfig',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify(productConfig),
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        productConfig = normalizeConfig(res.data);
        fillNotifyForm();
        renderRules();
        renderSummary();
        if (selectedRuleIndex >= productConfig.keywordRules.length) {
          selectedRuleIndex = productConfig.keywordRules.length - 1;
        }
        selectRule(selectedRuleIndex);
        layer.msg(res.msg || '保存成功');
        markConfigSaved();
        hydrateRuleThumbnails();
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  }

  function renderRules() {
    var body = $('#rulesBody');
    body.empty();
    body.toggleClass('is-scrollable', productConfig.keywordRules.length > 5);
    renderSummary();
    if (!productConfig.keywordRules.length) {
      body.append('<div class="empty">暂无关键词</div>');
      return;
    }
    productConfig.keywordRules.forEach(function(rule, index){
      var keywordRaw = firstWord(rule) || '未命名';
      var keyword = escapeHtml(keywordRaw);
      var row = $('<div class="rule-card" role="button" tabindex="0"></div>').toggleClass('active', index === selectedRuleIndex);
      var image = $('<img class="thumb" loading="lazy" decoding="async">');
      image.attr('alt', keywordRaw);
      image.on('error', function(){
        this.onerror = null;
        this.src = placeholderImage(keywordRaw);
      });
      image.attr('src', rule.previewPic ? proxiedImageUrl(rule.previewPic) : placeholderImage(keywordRaw));
      var wrap = $('<div class="rule-main"></div>');
      wrap.append(image);
      wrap.append('<div class="rule-text"><div class="keyword-name' + (rule.enabled ? '' : ' disabled') + '">' + keyword + '</div>' + statusTag(rule.enabled) + '</div>');
      row.append(wrap);
      row.append('<div class="rule-filter">' + renderTags(rule.filterWords) + '</div>');
      var priceText = priceRange(rule);
      var metrics = $('<div class="rule-metrics"></div>');
      metrics.append('<div class="rule-stat stat-comment" data-label="评论"><span>' + formatNumber(rule.lowCommentNum) + '</span></div>');
      metrics.append('<div class="rule-stat stat-worthy" data-label="值率"><span>' + formatNumber(rule.lowWorthyNum) + '%</span></div>');
      metrics.append('<div class="rule-stat rule-price stat-price" data-label="价格" title="' + escapeAttr(priceText) + '"><span>' + priceText + '</span></div>');
      row.append(metrics);
      var actionWrap = $('<div class="row-actions"></div>');
      actionWrap.append(iconButton('search', '预览', 'info icon-btn', function(e){ e.stopPropagation(); selectRule(index); searchSelectedRule(); }));
      actionWrap.append(iconButton('trash', '删除', 'danger icon-btn', function(e){ e.stopPropagation(); selectedRuleIndex = index; removeSelectedRule(); }));
      row.append(actionWrap);
      row.on('click', function(){ selectRule(index); });
      row.on('keydown', function(e){
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          selectRule(index);
        }
      });
      body.append(row);
    });
  }

  function selectRule(index) {
    syncEditorToRule();
    selectedRuleIndex = index;
    renderRules();
    fillEditor();
    clearPreview();
  }

  function fillEditor() {
    var rule = currentRule();
    if (!rule) {
      $('#editorMeta').text('未选择关键词');
      $('#keywordInput, #lowCommentInput, #lowWorthyInput, #minPriceInput, #maxPriceInput').val('');
      setFilterWordsInEditor([]);
    $('#enabledInput').prop('checked', false);
    fillTickEditor(productConfig.tickTime || 10800);
    $('#satisfyNumInput').val(productConfig.satisfyNum || 5);
    updateSwitchLabels();
    return;
  }
    $('#editorMeta').text('第 ' + (selectedRuleIndex + 1) + ' 条规则');
    $('#keywordInput').val(firstWord(rule));
    setFilterWordsInEditor(rule.filterWords);
    $('#lowCommentInput').val(rule.lowCommentNum || '');
    $('#lowWorthyInput').val(rule.lowWorthyNum || '');
    $('#minPriceInput').val(rule.minPrice || '');
    $('#maxPriceInput').val(rule.maxPrice || '');
    $('#enabledInput').prop('checked', !!rule.enabled);
    fillTickEditor(productConfig.tickTime || 10800);
    $('#satisfyNumInput').val(productConfig.satisfyNum || 5);
    updateSwitchLabels();
  }

  function syncEditorToRule() {
    if (selectedRuleIndex < 0 || selectedRuleIndex >= productConfig.keywordRules.length) {
      productConfig.tickTime = readTickSeconds() || productConfig.tickTime || 10800;
      productConfig.satisfyNum = toInt($('#satisfyNumInput').val()) || productConfig.satisfyNum || 5;
      return;
    }
    productConfig.keywordRules[selectedRuleIndex] = currentRuleFromEditor();
    productConfig.tickTime = readTickSeconds() || 10800;
    productConfig.satisfyNum = toInt($('#satisfyNumInput').val()) || 5;
  }

  function currentRuleFromEditor() {
    var previous = currentRule() || {};
    var rule = normalizeRule({
      enabled: $('#enabledInput').is(':checked'),
      words: textToList($('#keywordInput').val()).slice(0, 1),
      filterWords: getFilterWordsFromEditor(),
      lowCommentNum: toInt($('#lowCommentInput').val()),
      lowWorthyNum: toInt($('#lowWorthyInput').val()),
      minPrice: toFloat($('#minPriceInput').val()),
      maxPrice: toFloat($('#maxPriceInput').val())
    });
    if (previous.previewPic) {
      rule.previewPic = previous.previewPic;
    }
    return rule;
  }

  function searchSelectedRule() {
    syncEditorToRule();
    var rule = currentRule();
    if (!rule || !firstWord(rule)) {
      layer.msg('关键词不能为空');
      return;
    }
    setSearchLoading(true, '#searchRule', '搜索预览', '搜索中');
    $('#previewMeta').text('搜索中');
    $.ajax({
      url: BASE_URL + '/productSearch',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify({ rule: rule, limit: 24 }),
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        renderPreview(res.data || {});
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
        $('#previewMeta').text('搜索失败');
      },
      complete: function() {
        setSearchLoading(false, '#searchRule', '搜索预览', '搜索中');
      }
    });
  }

  function searchAllRules() {
    syncEditorToRule();
    var rules = productConfig.keywordRules.map(normalizeRule).filter(function(rule){
      return rule.enabled !== false && firstWord(rule);
    });
    if (!rules.length) {
      layer.msg('没有可搜索的已启用关键词');
      return;
    }
    setSearchLoading(true, '#searchAllRules', '全局搜索', '搜索中');
    $('#previewMeta').text('全局搜索中 · ' + rules.length + ' 条规则');
    var remaining = rules.length;
    var results = [];
    rules.forEach(function(rule, index){
      $.ajax({
        url: BASE_URL + '/productSearch',
        contentType: 'application/json;charset=utf-8',
        data: JSON.stringify({ rule: rule, limit: 8 }),
        dataType: 'json',
        type: 'POST',
        success: function(res) {
          results.push({ rule: rule, index: index, data: res.data || {} });
        },
        error: function(xhr) {
          results.push({ rule: rule, index: index, error: readError(xhr) });
        },
        complete: function() {
          remaining -= 1;
          if (remaining === 0) {
            results.sort(function(a, b){ return a.index - b.index; });
            renderGlobalPreview(results);
            setSearchLoading(false, '#searchAllRules', '全局搜索', '搜索中');
          }
        }
      });
    });
  }

  function renderPreview(data) {
    var items = data.items || [];
    previewOpenUrl = data.openUrl || keywordSearchUrl(data.keyword || firstWord(currentRule()));
    $('#previewMeta').text((data.keyword || '') + ' · ' + items.length + ' 条结果');
    if (!items.length) {
      setImage($('#previewImage'), previewPlaceholder);
      $('#previewImage').attr('alt', '');
      $('#previewTitle').text('暂无结果');
      $('#previewMetrics').empty();
      renderEmptyPreview('暂无匹配结果', '调整过滤词, 评论, 值率或价格范围后再搜索。');
      return;
    }
    var first = items[0];
    setImage($('#previewImage'), first.pic || previewPlaceholder);
    $('#previewImage').attr('alt', first.title || '商品图片');
    $('#previewTitle').text(first.title || '未命名商品');
    $('#previewMetrics').html('<span>价格 ' + escapeHtml(first.price || '-') + '</span><span>值率 ' + escapeHtml(first.worthy || '0') + '%</span><span>评论 ' + escapeHtml(first.comment || '0') + '</span>');
    if (currentRule()) {
      currentRule().previewPic = first.pic || '';
      renderRules();
    }
    var body = $('#previewCards');
    body.empty();
    body.toggleClass('is-scrollable', items.length > 6);
    items.slice(0, 6).forEach(function(item){
      body.append(productCard(item));
    });
  }

  function renderGlobalPreview(results) {
    var items = [];
    var seen = {};
    var failed = 0;
    results.forEach(function(result){
      if (result.error) {
        failed += 1;
        return;
      }
      var keyword = firstWord(result.rule);
      var list = result.data.items || [];
      list.forEach(function(item){
        var key = item.url || item.title || JSON.stringify(item);
        if (seen[key]) { return; }
        seen[key] = true;
        item.keyword = keyword;
        items.push(item);
      });
    });
    var first = items[0];
    previewOpenUrl = first && first.keyword ? keywordSearchUrl(first.keyword) : '';
    $('#previewMeta').text('全局搜索 · ' + results.length + ' 条规则 · ' + items.length + ' 条结果' + (failed ? ' · ' + failed + ' 条失败' : ''));
    if (!items.length) {
      setImage($('#previewImage'), previewPlaceholder);
      $('#previewImage').attr('alt', '');
      $('#previewTitle').text('暂无结果');
      $('#previewMetrics').empty();
      renderEmptyPreview('暂无匹配结果', '调整过滤词, 评论, 值率或价格范围后再搜索。');
      return;
    }
    setImage($('#previewImage'), first.pic || previewPlaceholder);
    $('#previewImage').attr('alt', first.title || '商品图片');
    $('#previewTitle').text(first.title || '未命名商品');
    $('#previewMetrics').html('<span>来自 ' + escapeHtml(first.keyword || '-') + '</span><span>价格 ' + escapeHtml(first.price || '-') + '</span><span>值率 ' + escapeHtml(first.worthy || '0') + '%</span><span>评论 ' + escapeHtml(first.comment || '0') + '</span>');
    var body = $('#previewCards');
    body.empty();
    body.toggleClass('is-scrollable', items.length > 6);
    items.slice(0, 6).forEach(function(item){
      body.append(productCard(item));
    });
  }

  function hydrateRuleThumbnails() {
    productConfig.keywordRules.forEach(function(rule, index){
      if (!firstWord(rule) || rule.previewPic) {
        return;
      }
      $.ajax({
        url: BASE_URL + '/productSearch',
        contentType: 'application/json;charset=utf-8',
        data: JSON.stringify({ rule: rule, limit: 1 }),
        dataType: 'json',
        type: 'POST',
        success: function(res) {
          var item = res.data && res.data.items && res.data.items[0];
          if (item && item.pic) {
            productConfig.keywordRules[index].previewPic = item.pic;
            renderRules();
          }
        }
      });
    });
  }

  function removeSelectedRule() {
    if (selectedRuleIndex < 0) { return; }
    productConfig.keywordRules.splice(selectedRuleIndex, 1);
    selectedRuleIndex = Math.min(selectedRuleIndex, productConfig.keywordRules.length - 1);
    renderRules();
    fillEditor();
    clearPreview();
  }

  function fillNotifyForm() {
    $('#telegramEnabled').prop('checked', !!productConfig.telegram.enabled);
    $('#telegramBotToken').val(productConfig.telegram.botToken || '');
    $('#telegramChatId').val(productConfig.telegram.chatId || '');
    $('#telegramParseMode').val(productConfig.telegram.parseMode || 'HTML');
    $('#telegramDisablePreview').prop('checked', !!productConfig.telegram.disableWebPagePreview);
    updateSwitchLabels();
  }

  function readNotifyForm() {
    productConfig.telegram = {
      enabled: $('#telegramEnabled').is(':checked'),
      botToken: ($('#telegramBotToken').val() || '').trim(),
      chatId: ($('#telegramChatId').val() || '').trim(),
      parseMode: $('#telegramParseMode').val() || 'HTML',
      disableWebPagePreview: $('#telegramDisablePreview').is(':checked')
    };
  }

  function updateSwitchLabels() {
    var ruleOn = $('#enabledInput').is(':checked');
    var botOn = $('#telegramEnabled').is(':checked');
    var previewOff = $('#telegramDisablePreview').is(':checked');
    $('.editor-panel .switch-copy strong').text(ruleOn ? '规则启用' : '规则停用');
    $('.editor-panel .switch-copy small').text(ruleOn ? '匹配后推送' : '不会推送');
    $('.notification-shell .switch-copy strong').text(botOn ? 'Bot 启用' : 'Bot 停用');
    $('.notification-shell .switch-copy small').text('Telegram');
    $('.setting-copy strong').text(previewOff ? '隐藏网页卡片' : '显示网页卡片');
    $('.setting-copy small').text(previewOff ? '只发送文本与链接' : '保留 Telegram 预览');
    $('#topTelegramStatus').text(botOn ? 'TG 正常' : 'TG 未启用').toggleClass('ok', botOn).toggleClass('off', !botOn);
  }

  function markConfigDirty() {
    $('#topSaveStatus').text('有未保存更改').addClass('dirty').removeClass('ok');
  }

  function markConfigSaved() {
    $('#topSaveStatus').text('已保存').addClass('ok').removeClass('dirty');
  }

  function clearPreview() {
    previewOpenUrl = '';
    $('#previewMeta').text('等待搜索');
    setImage($('#previewImage'), currentRule() && currentRule().previewPic ? currentRule().previewPic : previewPlaceholder);
    $('#previewImage').attr('alt', currentRule() ? (firstWord(currentRule()) || '') : '');
    $('#previewTitle').text(currentRule() ? (firstWord(currentRule()) || '暂无结果') : '暂无结果');
    $('#previewMetrics').empty();
    renderEmptyPreview('暂无搜索结果', '等待搜索');
  }

  function normalizeConfig(value) {
    value = value || {};
    value.telegram = value.telegram || {};
    var rules = (value.keywordRules || []).map(normalizeRule).filter(function(rule){ return firstWord(rule); });
    if (!rules.length && (value.keyWords || []).length) {
      rules = (value.keyWords || []).map(function(word){
        return normalizeRule({
          enabled: true,
          words: [word],
          filterWords: value.filterWords || [],
          lowCommentNum: value.lowCommentNum || 0,
          lowWorthyNum: value.lowWorthyNum || 0,
          minPrice: value.minPrice || 0,
          maxPrice: value.maxPrice || 0
        });
      });
    }
    return {
      keyWords: flattenKeywords(rules),
      filterWords: value.filterWords || [],
      lowCommentNum: value.lowCommentNum || 0,
      lowWorthyNum: value.lowWorthyNum || 0,
      minPrice: value.minPrice || 0,
      maxPrice: value.maxPrice || 0,
      satisfyNum: value.satisfyNum || 5,
      tickTime: value.tickTime || 10800,
      cron: value.cron || '0 10 10 ? * *',
      telegram: {
        enabled: !!value.telegram.enabled,
        botToken: value.telegram.botToken || '',
        chatId: value.telegram.chatId || '',
        parseMode: value.telegram.parseMode || 'HTML',
        disableWebPagePreview: !!value.telegram.disableWebPagePreview
      },
      keywordRules: rules
    };
  }

  function normalizeRule(rule) {
    rule = rule || {};
    return {
      enabled: rule.enabled !== false,
      words: textToList((rule.words || []).join ? (rule.words || []).join('\n') : rule.words).slice(0, 1),
      filterWords: textToList((rule.filterWords || []).join ? (rule.filterWords || []).join('\n') : rule.filterWords),
      lowCommentNum: toInt(rule.lowCommentNum),
      lowWorthyNum: toInt(rule.lowWorthyNum),
      minPrice: toFloat(rule.minPrice),
      maxPrice: toFloat(rule.maxPrice),
      previewPic: rule.previewPic || ''
    };
  }

  function emptyRule() {
    return normalizeRule({ enabled: true, words: [''], filterWords: [], lowCommentNum: 0, lowWorthyNum: 0, minPrice: 0, maxPrice: 0 });
  }

  function currentRule() {
    return selectedRuleIndex >= 0 ? productConfig.keywordRules[selectedRuleIndex] : null;
  }

  function firstWord(rule) {
    return rule && rule.words && rule.words.length ? rule.words[0] : '';
  }

  function flattenKeywords(rules) {
    return (rules || []).map(firstWord).filter(function(word, index, list){ return word && list.indexOf(word) === index; });
  }

  function renderSummary() {
    var rules = productConfig.keywordRules || [];
    var enabled = rules.filter(function(rule){ return rule.enabled !== false && firstWord(rule); }).length;
    var filters = [];
    rules.forEach(function(rule){
      filters = filters.concat(rule.filterWords || []);
    });
    $('#rulesMeta').text('规则 ' + rules.length + ' · 启用 ' + enabled + ' · 过滤词 ' + textToList(filters).length);
    $('#topRuleStatus').text('规则 ' + rules.length + ' / 启用 ' + enabled);
  }

  function listToText(list) {
    return (list || []).join('\n');
  }

  function textToList(text) {
    if (Array.isArray(text)) {
      text = text.join('\n');
    }
    return (text || '').split(/[\n,，\t\r]+/).map(function(item){
      return item.trim();
    }).filter(function(item, index, list){
      return item && list.indexOf(item) === index;
    });
  }

  function toInt(value) {
    var parsed = parseInt(value, 10);
    return isNaN(parsed) || parsed < 0 ? 0 : parsed;
  }

  function toFloat(value) {
    var parsed = parseFloat(value);
    return isNaN(parsed) || parsed < 0 ? 0 : parsed;
  }

  function formatNumber(value) {
    return value ? String(value) : '0';
  }

  function priceRange(rule) {
    var min = toFloat(rule.minPrice);
    var max = toFloat(rule.maxPrice);
    if (!min && !max) { return '不限'; }
    if (min && max) { return formatPrice(min) + '-' + formatPrice(max); }
    if (min) { return '≥' + formatPrice(min); }
    return '≤' + formatPrice(max);
  }

  function formatPrice(value) {
    var text = String(value);
    if (text.indexOf('.') >= 0) {
      text = text.replace(/0+$/, '').replace(/\.$/, '');
    }
    return '¥' + text;
  }

  function renderTags(list) {
    if (!list || !list.length) { return '<span class="tag off">无</span>'; }
    return list.map(function(item){ return '<span class="tag warn">' + escapeHtml(item) + '</span>'; }).join('');
  }

  function statusTag(enabled) {
    return enabled ? '<span class="tag on">已启用</span>' : '<span class="tag off">已停用</span>';
  }

  function fillTickEditor(seconds) {
    seconds = toInt(seconds) || 10800;
    var unit = 1;
    if (seconds % 3600 === 0) {
      unit = 3600;
    } else if (seconds % 60 === 0) {
      unit = 60;
    }
    $('#tickUnitInput').val(String(unit));
    $('#tickValueInput').val(seconds / unit);
  }

  function readTickSeconds() {
    var value = toFloat($('#tickValueInput').val());
    if (value <= 0) {
      return 0;
    }
    var unit = toInt($('#tickUnitInput').val()) || 1;
    return Math.max(60, Math.round(value * unit));
  }

  function setSearchLoading(loading, selector, idleText, loadingText) {
    var btn = $(selector || '#searchRule');
    var label = loading ? (loadingText || '搜索中') : (idleText || '搜索预览');
    btn.toggleClass('loading', !!loading);
    btn.prop('disabled', !!loading);
    if (btn.hasClass('icon-btn')) {
      btn.attr('aria-label', label).attr('title', label);
      btn.find('.sr-only').text(label);
      return;
    }
    btn.text(label);
  }

  function setImage(target, src) {
    target.attr('src', proxiedImageUrl(src));
  }

  function renderEmptyPreview(title, message) {
    $('#previewCards').removeClass('is-scrollable').html('<div class="empty-state">' + emptyStateSvg() + '<strong>' + escapeHtml(title) + '</strong><p>' + escapeHtml(message) + '</p></div>');
  }

  function productCard(item) {
    item = item || {};
    var card = $('<article class="product-card"></article>');
    var image = $('<img loading="lazy" decoding="async">');
    image.attr('alt', item.title || '商品图片');
    image.on('error', function(){
      this.onerror = null;
      this.src = placeholderImage(item.title || '商');
    });
    image.attr('src', item.pic ? proxiedImageUrl(item.pic) : placeholderImage(item.title || '商'));
    var info = $('<div class="product-info"></div>');
    info.append('<a class="product-title" target="_blank" rel="noopener" href="' + escapeAttr(item.url || '#') + '">' + escapeHtml(item.title || '未命名商品') + '</a>');
    var keywordTag = item.keyword ? '<span class="tag info">' + escapeHtml(item.keyword) + '</span>' : '';
    info.append('<div class="product-meta">' + keywordTag + '<span class="tag info product-price">' + escapeHtml(item.price || '-') + '</span><span class="tag">值率 ' + escapeHtml(item.worthy || '0') + '%</span><span class="tag">评论 ' + escapeHtml(item.comment || '0') + '</span></div>');
    info.append('<div class="product-source">' + escapeHtml(item.referral || '什么值得买') + (item.date ? ' · ' + escapeHtml(item.date) : '') + '</div>');
    var action = $('<div class="product-action"></div>');
    action.append('<a class="btn web icon-btn" target="_blank" rel="noopener" href="' + escapeAttr(item.url || '#') + '" aria-label="打开网页" title="打开网页">' + iconSvg('external') + '<span class="sr-only">打开网页</span></a>');
    card.append(image);
    card.append(info);
    card.append(action);
    return card;
  }

  function proxiedImageUrl(src) {
    src = (src || '').trim();
    if (!src) { return previewPlaceholder; }
    if (src.indexOf('data:') === 0 || src.indexOf('/imageProxy') === 0) { return src; }
    try {
      var imageUrl = new URL(src, window.location.href);
      if (imageUrl.origin === window.location.origin && imageUrl.pathname === '/imageProxy') {
        return imageUrl.href;
      }
      if (imageUrl.protocol !== 'http:' && imageUrl.protocol !== 'https:') {
        return src;
      }
      return BASE_URL + '/imageProxy?url=' + encodeURIComponent(imageUrl.href);
    } catch (e) {
      return src;
    }
  }

  function emptyStateSvg() {
    return '<svg viewBox="0 0 96 96" fill="none" aria-hidden="true"><rect x="18" y="22" width="46" height="38" rx="10" fill="#f0f0f2" stroke="#d2d2d7"/><path d="M30 39h22M30 49h14" stroke="#a1a1a6" stroke-width="4" stroke-linecap="round"/><circle cx="61" cy="60" r="13" fill="#fff" stroke="#b7b7bd" stroke-width="5"/><path d="M72 71l9 9" stroke="#b7b7bd" stroke-width="6" stroke-linecap="round"/></svg>';
  }

  function keywordSearchUrl(keyword) {
    keyword = (keyword || '').trim();
    return keyword ? 'https://search.smzdm.com/?c=faxian&s=' + encodeURIComponent(keyword) : '';
  }

  function button(text, cls, handler) {
    var btn = $('<button type="button" class="btn ' + cls + '"></button>').text(text);
    btn.on('click', handler);
    return btn;
  }

  function iconButton(icon, label, cls, handler) {
    var btn = $('<button type="button" class="btn ' + cls + '" aria-label="' + escapeAttr(label) + '" title="' + escapeAttr(label) + '"></button>');
    btn.html(iconSvg(icon) + '<span class="sr-only">' + escapeHtml(label) + '</span>');
    btn.on('click', handler);
    return btn;
  }

  function iconSvg(name) {
    if (name === 'trash') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>';
    }
    if (name === 'plus') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>';
    }
    if (name === 'refresh') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12a9 9 0 0 1 15.5-6.2"/><path d="M18 3v5h-5"/><path d="M6 21v-5h5"/></svg>';
    }
    if (name === 'save') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>';
    }
    if (name === 'copy') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="8" y="8" width="11" height="11" rx="2"/><path d="M5 16H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    }
    if (name === 'external') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 3h7v7"/><path d="M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg>';
    }
    if (name === 'x') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>';
    }
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>';
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch){
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
    });
  }

  function escapeAttr(value) {
    return escapeHtml(value || '#');
  }

  function readError(xhr) {
    try {
      return JSON.parse(xhr.responseText).msg || '请求失败';
    } catch (e) {
      return '请求失败';
    }
  }
});
</script>
</body>
</html>
