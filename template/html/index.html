<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>什么值得买提醒</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/layui/2.7.6/css/layui.css" media="all">
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.88);
      --line: rgba(0, 0, 0, 0.08);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --blue: #0071e3;
      --blue-weak: rgba(0, 113, 227, 0.1);
      --green: #2d7d46;
      --orange: #b35a00;
      --shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }
    .shell { max-width: 1380px; margin: 0 auto; padding: 28px 20px 42px; }
    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }
    h1 { margin: 0; font-size: 34px; line-height: 1.12; letter-spacing: 0; }
    .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .workspace {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(560px, 1fr);
      grid-template-areas:
        "rules preview"
        "editor notify";
      gap: 20px;
      align-items: stretch;
    }
    .column-stack { display: contents; }
    .rules-panel { grid-area: rules; }
    .editor-panel { grid-area: editor; }
    .preview-panel { grid-area: preview; }
    .notification-shell { grid-area: notify; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      padding: 18px;
      min-width: 0;
      height: 100%;
    }
    .panel + .panel { margin-top: 0; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    h2 { margin: 0; font-size: 20px; line-height: 1.25; letter-spacing: 0; }
    .meta { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .actions { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    .header-controls { display: flex; align-items: center; justify-content: flex-end; flex-wrap: wrap; gap: 10px; }
    .header-switch { display: inline-flex; align-items: center; gap: 10px; min-height: 36px; color: var(--text); font-size: 14px; font-weight: 650; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 13px;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary { background: var(--blue); color: #fff; box-shadow: 0 10px 24px rgba(0, 113, 227, 0.22); }
    .btn.secondary { background: rgba(255, 255, 255, 0.9); color: var(--text); border-color: var(--line); }
    .btn.danger { background: rgba(179, 90, 0, 0.08); color: var(--orange); border-color: rgba(179, 90, 0, 0.18); }
    .btn.ghost { background: transparent; color: var(--orange); border-color: transparent; box-shadow: none; }
    .btn.loading { pointer-events: none; opacity: .78; }
    .btn.loading::before {
      content: "";
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, .45);
      border-top-color: #fff;
      border-radius: 50%;
      margin-right: 7px;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.small { min-height: 30px; padding: 0 9px; font-size: 12px; }
    .icon-btn {
      width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      border-radius: 8px;
    }
    .icon-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease;
    }
    .field input,
    .field select { height: 42px; padding: 0 12px; }
    .field textarea { height: 84px; min-height: 84px; max-height: 128px; padding: 11px 12px; resize: vertical; line-height: 1.45; overflow-y: auto; }
    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: rgba(0, 113, 227, 0.62); box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.13); }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .editor-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px 12px; align-items: start; }
    .editor-grid .half { grid-column: span 2; }
    .editor-grid .wide { grid-column: span 2; }
    .editor-panel { padding: 16px 18px; }
    .editor-panel .section-head { margin-bottom: 10px; }
    .editor-panel .field label { margin-bottom: 5px; font-size: 12px; }
    .editor-panel .field input,
    .editor-panel .field select { height: 38px; }
    .editor-panel .field textarea { height: 38px; min-height: 38px; }
    .editor-panel .keyword-field input {
      height: 72px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 650;
    }
    .filter-field { min-width: 0; }
    .filter-token-box {
      width: 100%;
      height: 72px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      display: flex;
      align-content: flex-start;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 6px;
      overflow-y: auto;
      padding: 7px;
      cursor: text;
      transition: border-color .16s ease, box-shadow .16s ease;
    }
    .filter-token-box:focus-within {
      border-color: rgba(0, 113, 227, 0.62);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.13);
    }
    .filter-token-box::-webkit-scrollbar { width: 8px; }
    .filter-token-box::-webkit-scrollbar-thumb { border-radius: 999px; background: rgba(0, 0, 0, 0.16); }
    .filter-token {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 26px;
      border: 1px solid rgba(0, 113, 227, 0.15);
      border-radius: 999px;
      background: var(--blue-weak);
      color: var(--text);
      font-size: 12px;
      font-weight: 650;
      line-height: 1;
      padding: 0 3px 0 10px;
    }
    .filter-token span {
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .filter-token button {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 50%;
      margin-left: 2px;
      padding: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .filter-token button:hover { background: rgba(0, 0, 0, 0.08); color: var(--text); }
    .filter-token button svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .filter-token-input {
      flex: 1 1 98px;
      min-width: 98px;
      height: 26px !important;
      border: 0 !important;
      border-radius: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      padding: 0 4px !important;
      color: var(--text);
      font-size: 13px !important;
      font-weight: 500 !important;
      outline: none;
    }
    .editor-panel .btn { min-height: 34px; }
    .span-2 { grid-column: span 2; }
    .span-4 { grid-column: span 4; }
    .switch-row { display: flex; align-items: center; gap: 10px; min-height: 42px; }
    .switch {
      position: relative;
      width: 44px;
      height: 26px;
      flex: 0 0 auto;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch span {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #d2d2d7;
      cursor: pointer;
      transition: background .18s ease;
    }
    .switch span::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 7px rgba(0, 0, 0, .18);
      transition: transform .18s ease;
    }
    .switch input:checked + span { background: var(--blue); }
    .switch input:checked + span::before { transform: translateX(18px); }
    .range-control,
    .unit-control {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }
    .unit-control { grid-template-columns: 1fr 96px; }
    .range-control .sep { color: var(--muted); font-weight: 700; }
    .notify-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .rules-table {
      width: 100%;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
    }
    .rules-table th,
    .rules-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: middle;
      font-size: 13px;
    }
    .rules-table th { color: var(--muted); font-weight: 700; background: rgba(245, 245, 247, 0.86); }
    .rules-table th:nth-child(3),
    .rules-table th:nth-child(4),
    .rules-table th:nth-child(5),
    .rules-table th:nth-child(6),
    .rules-table td:nth-child(3),
    .rules-table td:nth-child(4),
    .rules-table td:nth-child(5),
    .rules-table td:nth-child(6) { text-align: center; }
    .rules-table tr:last-child td { border-bottom: 0; }
    .rules-table tbody tr { cursor: pointer; }
    .rules-table tbody tr.active { background: rgba(0, 113, 227, 0.07); }
    .thumb {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      object-fit: cover;
      background: linear-gradient(135deg, #f8f8fa, #e7e8ec);
      border: 1px solid var(--line);
      display: block;
    }
    .keyword-cell { display: flex; align-items: center; gap: 10px; min-width: 190px; }
    .keyword-name { font-weight: 700; color: var(--text); }
    .row-actions { display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
    .disabled { color: var(--muted); }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 6px;
      padding: 0 8px;
      background: rgba(0, 0, 0, 0.04);
      color: var(--muted);
      font-size: 12px;
      margin: 2px 4px 2px 0;
    }
    .tag.on { background: #eaf7ee; color: var(--green); }
    .tag.off { background: #f5f5f5; color: #8c8c8c; }
    .tag.warn { background: #fff7e6; color: #b35a00; }
    .tag.info { background: #eaf4ff; color: var(--blue); }
    .preview-hero {
      display: grid;
      grid-template-columns: 118px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      min-height: 142px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      padding: 12px;
      margin-bottom: 12px;
    }
    .preview-hero img {
      width: 118px;
      height: 118px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f0f0f2;
    }
    .preview-title { font-size: 16px; font-weight: 700; line-height: 1.35; margin-bottom: 8px; }
    .preview-metrics { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); font-size: 13px; }
    .product-list {
      display: grid;
      gap: 10px;
      max-height: 260px;
      overflow: auto;
      padding-right: 2px;
    }
    .product-card {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      padding: 10px;
    }
    .product-card img {
      width: 88px;
      height: 88px;
      border: 1px solid var(--line);
      border-radius: 8px;
      object-fit: cover;
      background: #f0f0f2;
    }
    .product-info { min-width: 0; }
    .product-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.36;
    }
    .product-title:hover { color: var(--blue); }
    .product-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .product-price { color: #c73b2d; font-weight: 750; }
    .product-source { margin-top: 6px; color: var(--muted); font-size: 12px; }
    .product-action { justify-self: end; white-space: nowrap; }
    .title-link { color: var(--text); text-decoration: none; font-weight: 650; }
    .title-link:hover { color: var(--blue); }
    .bottom-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 14px; }
    .empty { color: var(--muted); font-size: 13px; padding: 18px; text-align: center; }
    .empty-state {
      display: grid;
      place-items: center;
      gap: 8px;
      min-height: 180px;
      color: var(--muted);
      text-align: center;
      padding: 22px 12px;
    }
    .empty-state svg { width: 74px; height: 74px; opacity: .7; }
    .empty-state strong { color: var(--text); font-size: 15px; }
    .empty-state p { margin: 0; max-width: 310px; line-height: 1.5; }
    .editor-panel .bottom-bar { margin-top: 10px; }
    .notification-shell { min-height: 0; }
    @media (max-width: 1080px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-areas:
          "rules"
          "editor"
          "preview"
          "notify";
      }
    }
    @media (max-width: 720px) {
      .topbar { align-items: stretch; flex-direction: column; }
      .grid, .grid.two, .editor-grid, .notify-grid { grid-template-columns: 1fr; }
      .span-2, .span-4 { grid-column: span 1; }
      .editor-grid .half,
      .editor-grid .wide { grid-column: span 1; }
      .section-head { align-items: stretch; flex-direction: column; }
      .header-controls { justify-content: flex-start; }
      h1 { font-size: 28px; }
      .rules-table, .rules-table thead, .rules-table tbody, .rules-table tr, .rules-table td { display: block; width: 100%; }
      .rules-table thead { display: none; }
      .rules-table tr { padding: 10px 12px; border-bottom: 1px solid var(--line); }
      .rules-table tr:last-child { border-bottom: 0; }
      .rules-table td { border-bottom: 0; padding: 5px 0; }
      .rules-table td:nth-child(3),
      .rules-table td:nth-child(4),
      .rules-table td:nth-child(5) { display: inline-flex; width: auto; margin-right: 12px; }
      .rules-table td:nth-child(6) { text-align: left; }
      .row-actions { justify-content: flex-start; }
      .preview-hero { grid-template-columns: 1fr; }
      .preview-hero img { width: 100%; height: 180px; }
      .product-list { max-height: none; }
      .product-card { grid-template-columns: 76px minmax(0, 1fr); align-items: start; }
      .product-card img { width: 76px; height: 76px; }
      .product-action { grid-column: 1 / -1; justify-self: stretch; }
      .product-action .btn { width: 100%; }
      .bottom-bar { justify-content: stretch; }
      .bottom-bar .btn { flex: 1; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <h1>什么值得买提醒</h1>
      <p class="subtitle">按关键词独立维护过滤词, 评论, 值率和价格区间。</p>
    </div>
  </div>

  <div class="workspace">
    <div class="column-stack">
      <div class="panel rules-panel">
        <div class="section-head">
          <div>
            <h2>关键词规则</h2>
            <div class="meta">每个关键词独立启用, 独立设置过滤条件。</div>
          </div>
          <div class="actions">
            <button class="btn secondary" id="reloadProductConfig" type="button">重新加载</button>
            <button class="btn secondary" id="addRule" type="button">新增关键词</button>
            <button class="btn primary" id="saveProductConfig" type="button">保存配置</button>
          </div>
        </div>
        <table class="rules-table">
          <colgroup>
            <col style="width: 34%">
            <col style="width: 21%">
            <col style="width: 8%">
            <col style="width: 9%">
            <col style="width: 14%">
            <col style="width: 14%">
          </colgroup>
          <thead>
            <tr>
              <th>关键词</th>
              <th>过滤词</th>
              <th>评论</th>
              <th>值率</th>
              <th>价格</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rulesBody"></tbody>
        </table>
      </div>

      <div class="panel editor-panel">
        <div class="section-head">
          <div>
            <h2>规则详情</h2>
            <div class="meta" id="editorMeta">未选择关键词</div>
          </div>
          <div class="header-controls">
            <label class="header-switch">
              <span>启用</span>
              <span class="switch">
                <input id="enabledInput" type="checkbox">
                <span></span>
              </span>
              <span>推送匹配结果</span>
            </label>
            <button class="btn ghost" id="removeRule" type="button">删除</button>
            <button class="btn secondary" id="duplicateRule" type="button">复制</button>
          </div>
        </div>
        <div class="editor-grid">
          <div class="field keyword-field half">
            <label for="keywordInput">关键词</label>
            <input id="keywordInput" type="text" autocomplete="off">
          </div>
          <div class="field filter-field half">
            <label for="filterInput">过滤词</label>
            <div id="filterTokenBox" class="filter-token-box">
              <input id="filterInput" class="filter-token-input" type="text" autocomplete="off" placeholder="输入过滤词">
            </div>
          </div>
          <div class="field">
            <label for="lowCommentInput">最低评论</label>
            <input id="lowCommentInput" type="number" min="0">
          </div>
          <div class="field">
            <label for="lowWorthyInput">最低值率(%)</label>
            <input id="lowWorthyInput" type="number" min="0">
          </div>
          <div class="field wide">
            <label>价格区间</label>
            <div class="range-control">
              <input id="minPriceInput" type="number" min="0" step="0.01" aria-label="最低价格">
              <span class="sep">至</span>
              <input id="maxPriceInput" type="number" min="0" step="0.01" aria-label="最高价格">
            </div>
          </div>
          <div class="field half">
            <label for="tickValueInput">扫描间隔</label>
            <div class="unit-control">
              <input id="tickValueInput" type="number" min="1">
              <select id="tickUnitInput">
                <option value="60">分钟</option>
                <option value="3600">小时</option>
                <option value="1">秒</option>
              </select>
            </div>
          </div>
          <div class="field half">
            <label for="satisfyNumInput">每次推送数量</label>
            <input id="satisfyNumInput" type="number" min="1">
          </div>
        </div>
        <div class="bottom-bar">
          <button class="btn primary" id="searchRule" type="button">搜索预览</button>
        </div>
      </div>
    </div>

    <div class="column-stack">
      <div class="panel preview-panel">
        <div class="section-head">
          <div>
            <h2>搜索结果</h2>
            <div class="meta" id="previewMeta">等待搜索</div>
          </div>
        </div>
        <div id="previewHero" class="preview-hero">
          <img id="previewImage" alt="" src="">
          <div>
            <div class="preview-title" id="previewTitle">暂无结果</div>
            <div class="preview-metrics" id="previewMetrics"></div>
          </div>
        </div>
        <div id="previewCards" class="product-list"></div>
        <div class="bottom-bar">
          <button class="btn secondary" id="openSearchPage" type="button">打开网页</button>
        </div>
      </div>

      <div class="panel notification-shell">
        <div class="section-head">
          <div>
            <h2>Telegram 通知</h2>
            <div class="meta">商品命中后发送到指定 Chat。</div>
          </div>
          <div class="header-controls">
            <label class="header-switch">
              <span>启用</span>
              <span class="switch">
                <input id="telegramEnabled" type="checkbox">
                <span></span>
              </span>
              <span>Telegram Bot</span>
            </label>
            <button type="button" class="btn primary" id="saveNotifyConfig">保存配置</button>
          </div>
        </div>
        <div class="notify-grid">
          <div class="field">
            <label for="telegramParseMode">Parse Mode</label>
            <select id="telegramParseMode">
              <option value="HTML">HTML</option>
              <option value="">纯文本</option>
            </select>
          </div>
          <div class="field">
            <label for="telegramBotToken">Bot Token</label>
            <input id="telegramBotToken" type="password" autocomplete="off">
          </div>
          <div class="field">
            <label for="telegramChatId">Chat ID</label>
            <input id="telegramChatId" type="text" autocomplete="off">
          </div>
          <div class="field">
            <label>链接预览</label>
            <div class="switch-row">
              <label class="switch">
                <input id="telegramDisablePreview" type="checkbox">
                <span></span>
              </label>
              <span>禁用网页预览</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/layui/2.7.6/layui.js"></script>
<script>
var BASE_URL = window.location.origin;
var productConfig = {
  keyWords: [],
  filterWords: [],
  lowCommentNum: 0,
  lowWorthyNum: 0,
  minPrice: 0,
  maxPrice: 0,
  satisfyNum: 5,
  tickTime: 10800,
  cron: '0 10 10 ? * *',
  telegram: { enabled: false, botToken: '', chatId: '', parseMode: 'HTML', disableWebPagePreview: false },
  keywordRules: []
};
var selectedRuleIndex = -1;
var previewOpenUrl = '';
var filterEditorWords = [];
var previewPlaceholder = 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240"><rect width="100%" height="100%" rx="18" fill="#f0f0f2"/><circle cx="116" cy="108" r="34" fill="none" stroke="#b7b7bd" stroke-width="8"/><path d="M142 134l34 34" stroke="#b7b7bd" stroke-width="9" stroke-linecap="round"/><text x="50%" y="196" dominant-baseline="middle" text-anchor="middle" fill="#8e8e93" font-family="Arial" font-size="16">No Image</text></svg>');

layui.use(function(){
  var layer = layui.layer;
  var $ = layui.jquery;

  $('#reloadProductConfig').on('click', loadProductConfig);
  $('#addRule').on('click', function(){
    syncEditorToRule();
    productConfig.keywordRules.push(emptyRule());
    selectRule(productConfig.keywordRules.length - 1);
    renderRules();
  });
  $('#duplicateRule').on('click', function(){
    if (!currentRule()) { return; }
    syncEditorToRule();
    var copy = normalizeRule(JSON.parse(JSON.stringify(currentRule())));
    copy.words = [(copy.words[0] || '') + ' 副本'];
    delete copy.previewPic;
    productConfig.keywordRules.splice(selectedRuleIndex + 1, 0, copy);
    selectRule(selectedRuleIndex + 1);
    renderRules();
  });
  $('#removeRule').on('click', confirmRemoveSelectedRule);
  $('#saveProductConfig, #saveNotifyConfig').on('click', saveProductConfig);
  $('#searchRule').on('click', searchSelectedRule);
  $('#openSearchPage').on('click', function(){
    var rule = currentRuleFromEditor();
    var keyword = firstWord(rule);
    var url = previewOpenUrl || keywordSearchUrl(keyword);
    if (url) {
      window.open(url, '_blank', 'noopener');
    }
  });
  bindFilterTokenEditor();
  $('#keywordInput, #lowCommentInput, #lowWorthyInput, #minPriceInput, #maxPriceInput, #enabledInput, #tickValueInput, #tickUnitInput, #satisfyNumInput').on('input change', function(){
    syncEditorToRule();
    renderRules();
  });
  $('#previewImage').on('error', function(){
    this.onerror = null;
    this.src = previewPlaceholder;
  });

  loadProductConfig();

  function loadProductConfig() {
    $.ajax({
      url: BASE_URL + '/productConfig',
      dataType: 'json',
      type: 'GET',
      success: function(res) {
        productConfig = normalizeConfig(res.data);
        fillNotifyForm();
        renderRules();
        selectRule(productConfig.keywordRules.length ? 0 : -1);
        hydrateRuleThumbnails();
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  }

  function bindFilterTokenEditor() {
    $('#filterTokenBox').on('click', function(){
      $('#filterInput').trigger('focus');
    });
    $('#filterInput').on('keydown', function(e){
      if (e.key === 'Enter' || e.key === ',' || e.key === '，' || e.key === 'Tab') {
        if (($(this).val() || '').trim()) {
          e.preventDefault();
          addFilterWords($(this).val());
        }
        return;
      }
      if (e.key === 'Backspace' && !$(this).val() && filterEditorWords.length) {
        e.preventDefault();
        removeFilterWord(filterEditorWords.length - 1);
      }
    });
    $('#filterInput').on('paste', function(e){
      var clipboard = e.originalEvent && e.originalEvent.clipboardData;
      var text = clipboard ? clipboard.getData('text') : '';
      if (/[\n,，\t\r]+/.test(text)) {
        e.preventDefault();
        addFilterWords(text);
      }
    });
    $('#filterInput').on('blur', function(){
      commitFilterInput();
    });
  }

  function setFilterWordsInEditor(list) {
    filterEditorWords = textToList(list);
    $('#filterInput').val('');
    renderFilterTokens();
  }

  function getFilterWordsFromEditor() {
    return textToList(filterEditorWords.concat(textToList($('#filterInput').val())));
  }

  function addFilterWords(value) {
    var words = textToList(value);
    if (!words.length) { return; }
    filterEditorWords = textToList(filterEditorWords.concat(words));
    $('#filterInput').val('');
    renderFilterTokens();
    syncEditorToRule();
    renderRules();
  }

  function removeFilterWord(index) {
    if (index < 0 || index >= filterEditorWords.length) { return; }
    filterEditorWords.splice(index, 1);
    renderFilterTokens();
    syncEditorToRule();
    renderRules();
  }

  function commitFilterInput() {
    if (($('#filterInput').val() || '').trim()) {
      addFilterWords($('#filterInput').val());
    } else {
      renderFilterTokens();
    }
  }

  function renderFilterTokens() {
    var input = $('#filterInput');
    $('#filterTokenBox .filter-token').remove();
    filterEditorWords.forEach(function(word, index){
      var chip = $('<span class="filter-token"></span>');
      chip.append('<span title="' + escapeAttr(word) + '">' + escapeHtml(word) + '</span>');
      var remove = $('<button type="button" aria-label="删除过滤词 ' + escapeAttr(word) + '" title="删除"></button>');
      remove.html(iconSvg('x'));
      remove.on('mousedown', function(e){ e.preventDefault(); });
      remove.on('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        removeFilterWord(index);
        input.trigger('focus');
      });
      chip.append(remove);
      input.before(chip);
    });
  }

  function saveProductConfig() {
    syncEditorToRule();
    readNotifyForm();
    productConfig.keyWords = flattenKeywords(productConfig.keywordRules);
    $.ajax({
      url: BASE_URL + '/productConfig',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify(productConfig),
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        productConfig = normalizeConfig(res.data);
        fillNotifyForm();
        renderRules();
        if (selectedRuleIndex >= productConfig.keywordRules.length) {
          selectedRuleIndex = productConfig.keywordRules.length - 1;
        }
        selectRule(selectedRuleIndex);
        layer.msg(res.msg || '保存成功');
        hydrateRuleThumbnails();
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  }

  function renderRules() {
    var body = $('#rulesBody');
    body.empty();
    if (!productConfig.keywordRules.length) {
      body.append('<tr><td colspan="6" class="empty">暂无关键词</td></tr>');
      return;
    }
    productConfig.keywordRules.forEach(function(rule, index){
      var keyword = escapeHtml(firstWord(rule) || '未命名');
      var row = $('<tr></tr>').toggleClass('active', index === selectedRuleIndex);
      var image = $('<img class="thumb" alt="">');
      image.on('error', function(){
        this.onerror = null;
        this.src = previewPlaceholder;
      });
      image.attr('src', proxiedImageUrl(rule.previewPic));
      var keywordCell = $('<td></td>');
      var wrap = $('<div class="keyword-cell"></div>');
      wrap.append(image);
      wrap.append('<div><div class="keyword-name' + (rule.enabled ? '' : ' disabled') + '">' + keyword + '</div><div>' + statusTag(rule.enabled) + '</div></div>');
      keywordCell.append(wrap);
      row.append(keywordCell);
      row.append('<td>' + renderTags(rule.filterWords) + '</td>');
      row.append('<td>' + formatNumber(rule.lowCommentNum) + '</td>');
      row.append('<td>' + formatNumber(rule.lowWorthyNum) + '%</td>');
      row.append('<td>' + priceRange(rule) + '</td>');
      var actions = $('<td></td>');
      var actionWrap = $('<div class="row-actions"></div>');
      actionWrap.append(iconButton('search', '预览', 'secondary icon-btn', function(e){ e.stopPropagation(); selectRule(index); searchSelectedRule(); }));
      actionWrap.append(iconButton('trash', '删除', 'danger icon-btn', function(e){ e.stopPropagation(); selectedRuleIndex = index; confirmRemoveSelectedRule(); }));
      actions.append(actionWrap);
      row.append(actions);
      row.on('click', function(){ selectRule(index); });
      body.append(row);
    });
  }

  function selectRule(index) {
    syncEditorToRule();
    selectedRuleIndex = index;
    renderRules();
    fillEditor();
    clearPreview();
  }

  function fillEditor() {
    var rule = currentRule();
    if (!rule) {
      $('#editorMeta').text('未选择关键词');
      $('#keywordInput, #lowCommentInput, #lowWorthyInput, #minPriceInput, #maxPriceInput').val('');
      setFilterWordsInEditor([]);
      $('#enabledInput').prop('checked', false);
      fillTickEditor(productConfig.tickTime || 10800);
      $('#satisfyNumInput').val(productConfig.satisfyNum || 5);
      return;
    }
    $('#editorMeta').text('第 ' + (selectedRuleIndex + 1) + ' 条规则');
    $('#keywordInput').val(firstWord(rule));
    setFilterWordsInEditor(rule.filterWords);
    $('#lowCommentInput').val(rule.lowCommentNum || '');
    $('#lowWorthyInput').val(rule.lowWorthyNum || '');
    $('#minPriceInput').val(rule.minPrice || '');
    $('#maxPriceInput').val(rule.maxPrice || '');
    $('#enabledInput').prop('checked', !!rule.enabled);
    fillTickEditor(productConfig.tickTime || 10800);
    $('#satisfyNumInput').val(productConfig.satisfyNum || 5);
  }

  function syncEditorToRule() {
    if (selectedRuleIndex < 0 || selectedRuleIndex >= productConfig.keywordRules.length) {
      productConfig.tickTime = readTickSeconds() || productConfig.tickTime || 10800;
      productConfig.satisfyNum = toInt($('#satisfyNumInput').val()) || productConfig.satisfyNum || 5;
      return;
    }
    productConfig.keywordRules[selectedRuleIndex] = currentRuleFromEditor();
    productConfig.tickTime = readTickSeconds() || 10800;
    productConfig.satisfyNum = toInt($('#satisfyNumInput').val()) || 5;
  }

  function currentRuleFromEditor() {
    var previous = currentRule() || {};
    var rule = normalizeRule({
      enabled: $('#enabledInput').is(':checked'),
      words: textToList($('#keywordInput').val()).slice(0, 1),
      filterWords: getFilterWordsFromEditor(),
      lowCommentNum: toInt($('#lowCommentInput').val()),
      lowWorthyNum: toInt($('#lowWorthyInput').val()),
      minPrice: toFloat($('#minPriceInput').val()),
      maxPrice: toFloat($('#maxPriceInput').val())
    });
    if (previous.previewPic) {
      rule.previewPic = previous.previewPic;
    }
    return rule;
  }

  function searchSelectedRule() {
    syncEditorToRule();
    var rule = currentRule();
    if (!rule || !firstWord(rule)) {
      layer.msg('关键词不能为空');
      return;
    }
    setSearchLoading(true);
    $('#previewMeta').text('搜索中');
    $.ajax({
      url: BASE_URL + '/productSearch',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify({ rule: rule, limit: 24 }),
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        renderPreview(res.data || {});
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
        $('#previewMeta').text('搜索失败');
      },
      complete: function() {
        setSearchLoading(false);
      }
    });
  }

  function renderPreview(data) {
    var items = data.items || [];
    previewOpenUrl = data.openUrl || keywordSearchUrl(data.keyword || firstWord(currentRule()));
    $('#previewMeta').text((data.keyword || '') + ' · ' + items.length + ' 条结果');
    if (!items.length) {
      setImage($('#previewImage'), previewPlaceholder);
      $('#previewTitle').text('暂无结果');
      $('#previewMetrics').empty();
      renderEmptyPreview('暂无匹配结果', '调整过滤词, 评论, 值率或价格范围后再搜索。');
      return;
    }
    var first = items[0];
    setImage($('#previewImage'), first.pic || previewPlaceholder);
    $('#previewTitle').text(first.title || '未命名商品');
    $('#previewMetrics').html('<span>价格 ' + escapeHtml(first.price || '-') + '</span><span>值率 ' + escapeHtml(first.worthy || '0') + '%</span><span>评论 ' + escapeHtml(first.comment || '0') + '</span>');
    if (currentRule()) {
      currentRule().previewPic = first.pic || '';
      renderRules();
    }
    var body = $('#previewCards');
    body.empty();
    items.forEach(function(item){
      body.append(productCard(item));
    });
  }

  function hydrateRuleThumbnails() {
    productConfig.keywordRules.forEach(function(rule, index){
      if (!firstWord(rule) || rule.previewPic) {
        return;
      }
      $.ajax({
        url: BASE_URL + '/productSearch',
        contentType: 'application/json;charset=utf-8',
        data: JSON.stringify({ rule: rule, limit: 1 }),
        dataType: 'json',
        type: 'POST',
        success: function(res) {
          var item = res.data && res.data.items && res.data.items[0];
          if (item && item.pic) {
            productConfig.keywordRules[index].previewPic = item.pic;
            renderRules();
          }
        }
      });
    });
  }

  function confirmRemoveSelectedRule() {
    if (selectedRuleIndex < 0) { return; }
    layer.confirm('确定要删除该关键词规则吗？此操作不可撤销。', {
      title: '删除关键词规则',
      btn: ['删除', '取消']
    }, function(index){
      layer.close(index);
      removeSelectedRule();
    });
  }

  function removeSelectedRule() {
    if (selectedRuleIndex < 0) { return; }
    productConfig.keywordRules.splice(selectedRuleIndex, 1);
    selectedRuleIndex = Math.min(selectedRuleIndex, productConfig.keywordRules.length - 1);
    renderRules();
    fillEditor();
    clearPreview();
  }

  function fillNotifyForm() {
    $('#telegramEnabled').prop('checked', !!productConfig.telegram.enabled);
    $('#telegramBotToken').val(productConfig.telegram.botToken || '');
    $('#telegramChatId').val(productConfig.telegram.chatId || '');
    $('#telegramParseMode').val(productConfig.telegram.parseMode || 'HTML');
    $('#telegramDisablePreview').prop('checked', !!productConfig.telegram.disableWebPagePreview);
  }

  function readNotifyForm() {
    productConfig.telegram = {
      enabled: $('#telegramEnabled').is(':checked'),
      botToken: ($('#telegramBotToken').val() || '').trim(),
      chatId: ($('#telegramChatId').val() || '').trim(),
      parseMode: $('#telegramParseMode').val() || 'HTML',
      disableWebPagePreview: $('#telegramDisablePreview').is(':checked')
    };
  }

  function clearPreview() {
    previewOpenUrl = '';
    $('#previewMeta').text('等待搜索');
    setImage($('#previewImage'), currentRule() && currentRule().previewPic ? currentRule().previewPic : previewPlaceholder);
    $('#previewTitle').text(currentRule() ? (firstWord(currentRule()) || '暂无结果') : '暂无结果');
    $('#previewMetrics').empty();
    renderEmptyPreview('暂无搜索结果', '输入关键词并点击“搜索预览”, 下方会展示匹配商品。');
  }

  function normalizeConfig(value) {
    value = value || {};
    value.telegram = value.telegram || {};
    var rules = (value.keywordRules || []).map(normalizeRule).filter(function(rule){ return firstWord(rule); });
    if (!rules.length && (value.keyWords || []).length) {
      rules = (value.keyWords || []).map(function(word){
        return normalizeRule({
          enabled: true,
          words: [word],
          filterWords: value.filterWords || [],
          lowCommentNum: value.lowCommentNum || 0,
          lowWorthyNum: value.lowWorthyNum || 0,
          minPrice: value.minPrice || 0,
          maxPrice: value.maxPrice || 0
        });
      });
    }
    return {
      keyWords: flattenKeywords(rules),
      filterWords: value.filterWords || [],
      lowCommentNum: value.lowCommentNum || 0,
      lowWorthyNum: value.lowWorthyNum || 0,
      minPrice: value.minPrice || 0,
      maxPrice: value.maxPrice || 0,
      satisfyNum: value.satisfyNum || 5,
      tickTime: value.tickTime || 10800,
      cron: value.cron || '0 10 10 ? * *',
      telegram: {
        enabled: !!value.telegram.enabled,
        botToken: value.telegram.botToken || '',
        chatId: value.telegram.chatId || '',
        parseMode: value.telegram.parseMode || 'HTML',
        disableWebPagePreview: !!value.telegram.disableWebPagePreview
      },
      keywordRules: rules
    };
  }

  function normalizeRule(rule) {
    rule = rule || {};
    return {
      enabled: rule.enabled !== false,
      words: textToList((rule.words || []).join ? (rule.words || []).join('\n') : rule.words).slice(0, 1),
      filterWords: textToList((rule.filterWords || []).join ? (rule.filterWords || []).join('\n') : rule.filterWords),
      lowCommentNum: toInt(rule.lowCommentNum),
      lowWorthyNum: toInt(rule.lowWorthyNum),
      minPrice: toFloat(rule.minPrice),
      maxPrice: toFloat(rule.maxPrice),
      previewPic: rule.previewPic || ''
    };
  }

  function emptyRule() {
    return normalizeRule({ enabled: true, words: [''], filterWords: [], lowCommentNum: 0, lowWorthyNum: 0, minPrice: 0, maxPrice: 0 });
  }

  function currentRule() {
    return selectedRuleIndex >= 0 ? productConfig.keywordRules[selectedRuleIndex] : null;
  }

  function firstWord(rule) {
    return rule && rule.words && rule.words.length ? rule.words[0] : '';
  }

  function flattenKeywords(rules) {
    return (rules || []).map(firstWord).filter(function(word, index, list){ return word && list.indexOf(word) === index; });
  }

  function listToText(list) {
    return (list || []).join('\n');
  }

  function textToList(text) {
    if (Array.isArray(text)) {
      text = text.join('\n');
    }
    return (text || '').split(/[\n,，\t\r]+/).map(function(item){
      return item.trim();
    }).filter(function(item, index, list){
      return item && list.indexOf(item) === index;
    });
  }

  function toInt(value) {
    var parsed = parseInt(value, 10);
    return isNaN(parsed) || parsed < 0 ? 0 : parsed;
  }

  function toFloat(value) {
    var parsed = parseFloat(value);
    return isNaN(parsed) || parsed < 0 ? 0 : parsed;
  }

  function formatNumber(value) {
    return value ? String(value) : '0';
  }

  function priceRange(rule) {
    var min = rule.minPrice || 0;
    var max = rule.maxPrice || 0;
    if (!min && !max) { return '不限'; }
    return (min || 0) + ' - ' + (max || '不限');
  }

  function renderTags(list) {
    if (!list || !list.length) { return '<span class="tag off">无</span>'; }
    return list.map(function(item){ return '<span class="tag warn">' + escapeHtml(item) + '</span>'; }).join('');
  }

  function statusTag(enabled) {
    return enabled ? '<span class="tag on">已启用</span>' : '<span class="tag off">已停用</span>';
  }

  function fillTickEditor(seconds) {
    seconds = toInt(seconds) || 10800;
    var unit = 1;
    if (seconds % 3600 === 0) {
      unit = 3600;
    } else if (seconds % 60 === 0) {
      unit = 60;
    }
    $('#tickUnitInput').val(String(unit));
    $('#tickValueInput').val(seconds / unit);
  }

  function readTickSeconds() {
    var value = toFloat($('#tickValueInput').val());
    if (value <= 0) {
      return 0;
    }
    var unit = toInt($('#tickUnitInput').val()) || 1;
    return Math.max(60, Math.round(value * unit));
  }

  function setSearchLoading(loading) {
    var btn = $('#searchRule');
    btn.toggleClass('loading', !!loading);
    btn.prop('disabled', !!loading);
    btn.text(loading ? '搜索中' : '搜索预览');
  }

  function setImage(target, src) {
    target.attr('src', proxiedImageUrl(src));
  }

  function renderEmptyPreview(title, message) {
    $('#previewCards').html('<div class="empty-state">' + emptyStateSvg() + '<strong>' + escapeHtml(title) + '</strong><p>' + escapeHtml(message) + '</p></div>');
  }

  function productCard(item) {
    item = item || {};
    var card = $('<article class="product-card"></article>');
    var image = $('<img alt="">');
    image.on('error', function(){
      this.onerror = null;
      this.src = previewPlaceholder;
    });
    image.attr('src', proxiedImageUrl(item.pic));
    var info = $('<div class="product-info"></div>');
    info.append('<a class="product-title" target="_blank" rel="noopener" href="' + escapeAttr(item.url || '#') + '">' + escapeHtml(item.title || '未命名商品') + '</a>');
    info.append('<div class="product-meta"><span class="tag info product-price">' + escapeHtml(item.price || '-') + '</span><span class="tag">值率 ' + escapeHtml(item.worthy || '0') + '%</span><span class="tag">评论 ' + escapeHtml(item.comment || '0') + '</span></div>');
    info.append('<div class="product-source">' + escapeHtml(item.referral || '什么值得买') + (item.date ? ' · ' + escapeHtml(item.date) : '') + '</div>');
    var action = $('<div class="product-action"></div>');
    action.append('<a class="btn secondary small" target="_blank" rel="noopener" href="' + escapeAttr(item.url || '#') + '">打开</a>');
    card.append(image);
    card.append(info);
    card.append(action);
    return card;
  }

  function proxiedImageUrl(src) {
    src = (src || '').trim();
    if (!src) { return previewPlaceholder; }
    if (src.indexOf('data:') === 0 || src.indexOf('/imageProxy') === 0) { return src; }
    try {
      var imageUrl = new URL(src, window.location.href);
      if (imageUrl.origin === window.location.origin && imageUrl.pathname === '/imageProxy') {
        return imageUrl.href;
      }
      if (imageUrl.protocol !== 'http:' && imageUrl.protocol !== 'https:') {
        return src;
      }
      return BASE_URL + '/imageProxy?url=' + encodeURIComponent(imageUrl.href);
    } catch (e) {
      return src;
    }
  }

  function emptyStateSvg() {
    return '<svg viewBox="0 0 96 96" fill="none" aria-hidden="true"><rect x="18" y="22" width="46" height="38" rx="10" fill="#f0f0f2" stroke="#d2d2d7"/><path d="M30 39h22M30 49h14" stroke="#a1a1a6" stroke-width="4" stroke-linecap="round"/><circle cx="61" cy="60" r="13" fill="#fff" stroke="#b7b7bd" stroke-width="5"/><path d="M72 71l9 9" stroke="#b7b7bd" stroke-width="6" stroke-linecap="round"/></svg>';
  }

  function keywordSearchUrl(keyword) {
    keyword = (keyword || '').trim();
    return keyword ? 'https://search.smzdm.com/?c=faxian&s=' + encodeURIComponent(keyword) : '';
  }

  function button(text, cls, handler) {
    var btn = $('<button type="button" class="btn ' + cls + '"></button>').text(text);
    btn.on('click', handler);
    return btn;
  }

  function iconButton(icon, label, cls, handler) {
    var btn = $('<button type="button" class="btn ' + cls + '" aria-label="' + escapeAttr(label) + '" title="' + escapeAttr(label) + '"></button>');
    btn.html(iconSvg(icon) + '<span class="sr-only">' + escapeHtml(label) + '</span>');
    btn.on('click', handler);
    return btn;
  }

  function iconSvg(name) {
    if (name === 'trash') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>';
    }
    if (name === 'x') {
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>';
    }
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>';
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch){
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
    });
  }

  function escapeAttr(value) {
    return escapeHtml(value || '#');
  }

  function readError(xhr) {
    try {
      return JSON.parse(xhr.responseText).msg || '请求失败';
    } catch (e) {
      return '请求失败';
    }
  }
});
</script>
