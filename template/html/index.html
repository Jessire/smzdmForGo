<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>什么值得买管理面板</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/layui/2.7.6/css/layui.css" media="all">
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.82);
      --line: rgba(0, 0, 0, 0.08);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --blue: #0071e3;
      --blue-hover: #0077ed;
      --green: #2d7d46;
      --orange: #b35a00;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }
    .shell { max-width: 1240px; margin: 0 auto; padding: 34px 22px 44px; }
    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }
    .title-wrap h1 { margin: 0; font-size: 36px; line-height: 1.14; font-weight: 700; letter-spacing: 0; }
    .title-wrap p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .tabs {
      display: inline-flex;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(20px);
    }
    .tab-btn {
      border: 0;
      border-radius: 6px;
      padding: 10px 16px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .tab-btn.active { background: #fff; color: var(--text); box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      padding: 22px;
    }
    .panel + .panel { margin-top: 16px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }
    .section-head h2 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: 0; }
    .section-head .meta { color: var(--muted); font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .span-2 { grid-column: span 2; }
    .span-4 { grid-column: span 4; }
    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font-size: 14px;
      line-height: 1.45;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .field input,
    .field select { height: 42px; padding: 0 12px; }
    .field textarea { min-height: 116px; resize: vertical; padding: 12px; }
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: rgba(0, 113, 227, 0.68);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.14);
      background: #fff;
    }
    .switch-row { display: flex; align-items: center; gap: 10px; height: 42px; }
    .switch-row input { width: 18px; height: 18px; accent-color: var(--blue); }
    .actions { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      transition: transform .14s ease, box-shadow .14s ease, background .14s ease, border-color .14s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary { background: var(--blue); color: #fff; box-shadow: 0 10px 24px rgba(0, 113, 227, 0.24); }
    .btn.primary:hover { background: var(--blue-hover); }
    .btn.secondary { background: rgba(255, 255, 255, 0.88); border-color: var(--line); color: var(--text); }
    .btn.danger { background: rgba(179, 90, 0, 0.08); color: var(--orange); border-color: rgba(179, 90, 0, 0.18); }
    .btn.small { min-height: 30px; padding: 0 10px; font-size: 12px; }
    .keyword-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 38px;
      padding-top: 2px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      padding: 6px 8px 6px 11px;
      font-size: 13px;
      color: var(--text);
    }
    .chip button {
      border: 0;
      border-radius: 6px;
      background: rgba(0, 113, 227, 0.10);
      color: var(--blue);
      cursor: pointer;
      padding: 4px 7px;
      font-size: 12px;
      font-weight: 700;
    }
    .table-wrap {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
    }
    .layui-table-view { margin: 0; border: 0; }
    .layui-table-header, .layui-table-tool { background: rgba(245, 245, 247, 0.85); }
    .layui-table th { color: var(--muted); font-weight: 700; }
    .layui-table-cell { color: var(--text); }
    .empty-note { color: var(--muted); font-size: 13px; }
    .rule-form { padding: 20px; }
    .rule-form .field { margin-bottom: 14px; }
    @media (max-width: 920px) {
      .topbar { align-items: stretch; flex-direction: column; }
      .tabs { width: 100%; }
      .tab-btn { flex: 1; }
      .grid, .grid.two { grid-template-columns: 1fr; }
      .span-2, .span-4 { grid-column: span 1; }
      .title-wrap h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="title-wrap">
      <h1>什么值得买管理面板</h1>
      <p>账号, 关键词, 过滤词, 阈值和通知都在这里维护。</p>
    </div>
    <div class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="accounts" type="button">签到账号</button>
      <button class="tab-btn" data-tab="rules" type="button">商品配置</button>
    </div>
  </div>

  <section id="accountsPanel" class="tab-panel active">
    <div class="panel">
      <div class="section-head">
        <div>
          <h2>签到账号</h2>
          <div class="meta">Cookie 保存到数据库, 手动签到会立即写回状态。</div>
        </div>
        <button class="btn primary" id="addAccount" type="button">新增账号</button>
      </div>
      <div class="table-wrap">
        <table class="layui-hide" id="accountTable" lay-filter="accountTable"></table>
      </div>
    </div>
  </section>

  <section id="rulesPanel" class="tab-panel">
    <div class="panel">
      <div class="section-head">
        <div>
          <h2>关键词与阈值</h2>
          <div class="meta">全局规则会用于商品筛选, 独立规则会覆盖对应关键词的过滤条件。</div>
        </div>
        <div class="actions">
          <button type="button" class="btn secondary" id="reloadProductConfig">重新加载</button>
          <button type="button" class="btn primary" id="saveProductConfig">保存配置</button>
        </div>
      </div>
      <form id="productConfigForm">
        <div class="grid">
          <div class="field span-2">
            <label for="keyWords">关键词</label>
            <textarea id="keyWords" name="keyWords"></textarea>
          </div>
          <div class="field span-2">
            <label for="filterWords">过滤词</label>
            <textarea id="filterWords" name="filterWords"></textarea>
          </div>
          <div class="field">
            <label for="lowCommentNum">最低评论</label>
            <input id="lowCommentNum" type="number" name="lowCommentNum" min="0">
          </div>
          <div class="field">
            <label for="lowWorthyNum">最低值率(%)</label>
            <input id="lowWorthyNum" type="number" name="lowWorthyNum" min="0">
          </div>
          <div class="field">
            <label for="minPrice">最低价格</label>
            <input id="minPrice" type="number" name="minPrice" min="0" step="0.01">
          </div>
          <div class="field">
            <label for="maxPrice">最高价格</label>
            <input id="maxPrice" type="number" name="maxPrice" min="0" step="0.01">
          </div>
          <div class="field">
            <label for="satisfyNum">推送数量</label>
            <input id="satisfyNum" type="number" name="satisfyNum" min="1">
          </div>
          <div class="field">
            <label for="tickTime">扫描间隔(秒)</label>
            <input id="tickTime" type="number" name="tickTime" min="60">
          </div>
          <div class="field span-2">
            <label for="cron">签到 Cron</label>
            <input id="cron" type="text" name="cron">
          </div>
          <div class="field span-4">
            <label>关键词搜索</label>
            <div id="keywordCloud" class="keyword-cloud">
              <span class="empty-note">暂无关键词</span>
            </div>
          </div>
        </div>
      </form>
    </div>

    <div class="panel">
      <div class="section-head">
        <div>
          <h2>Telegram 通知</h2>
          <div class="meta">保存后商品推送和签到文本都会发到 Telegram Bot。</div>
        </div>
      </div>
      <div class="grid two">
        <div class="field">
          <label>启用通知</label>
          <div class="switch-row">
            <input id="telegramEnabled" type="checkbox">
            <span>Telegram Bot</span>
          </div>
        </div>
        <div class="field">
          <label for="telegramParseMode">Parse Mode</label>
          <select id="telegramParseMode">
            <option value="HTML">HTML</option>
            <option value="">纯文本</option>
          </select>
        </div>
        <div class="field">
          <label for="telegramBotToken">Bot Token</label>
          <input id="telegramBotToken" type="password" autocomplete="off">
        </div>
        <div class="field">
          <label for="telegramChatId">Chat ID</label>
          <input id="telegramChatId" type="text" autocomplete="off">
        </div>
        <div class="field">
          <label>链接预览</label>
          <div class="switch-row">
            <input id="telegramDisablePreview" type="checkbox">
            <span>禁用网页预览</span>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="section-head">
        <div>
          <h2>独立关键词规则</h2>
          <div class="meta">每条规则可以单独设置关键词, 过滤词, 评论, 值率和价格范围。</div>
        </div>
        <button type="button" class="btn secondary" id="addRule">新增规则</button>
      </div>
      <div class="table-wrap">
        <table class="layui-hide" id="ruleTable" lay-filter="ruleTable"></table>
      </div>
    </div>
  </section>
</div>

<script type="text/html" id="accountActions">
  <button class="btn small secondary" lay-event="check">签到</button>
</script>

<script type="text/html" id="ruleActions">
  <button class="btn small secondary" lay-event="search">搜索</button>
  <button class="btn small secondary" lay-event="edit">编辑</button>
  <button class="btn small danger" lay-event="remove">删除</button>
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/layui/2.7.6/layui.js"></script>
<script>
var BASE_URL = window.location.origin;
var productConfig = {
  keyWords: [],
  filterWords: [],
  lowCommentNum: 0,
  lowWorthyNum: 0,
  minPrice: 0,
  maxPrice: 0,
  satisfyNum: 5,
  tickTime: 10800,
  cron: '0 10 10 ? * *',
  telegram: {
    enabled: false,
    botToken: '',
    chatId: '',
    parseMode: 'HTML',
    disableWebPagePreview: false
  },
  keywordRules: []
};

layui.use(function(){
  var layer = layui.layer;
  var table = layui.table;
  var $ = layui.jquery;

  $('.tab-btn').on('click', function(){
    var tab = $(this).data('tab');
    $('.tab-btn').removeClass('active');
    $(this).addClass('active');
    $('.tab-panel').removeClass('active');
    $('#' + tab + 'Panel').addClass('active');
    if (tab === 'rules') {
      table.resize('ruleTable');
    } else {
      table.resize('accountTable');
    }
  });

  table.render({
    elem: '#accountTable',
    height: 440,
    url: BASE_URL + '/conf',
    title: 'smzdm签到表',
    page: false,
    toolbar: false,
    defaultToolbar: [],
    totalRow: false,
    cols: [[
      {field: 'Id', title: 'ID', width: 80, sort: true, fixed: 'left'},
      {field: 'Remark', title: '备注', width: 160, align: 'center'},
      {field: 'LastResult', title: '结果', width: 120, align: 'center'},
      {field: 'LastTIme', title: '最近时间', align: 'center', width: 176},
      {field: 'LastMsg', title: '返回消息', align: 'center', minWidth: 250},
      {field: 'Cookie', title: 'Cookie', align: 'center', minWidth: 280},
      {fixed: 'right', width: 96, align: 'center', toolbar: '#accountActions'}
    ]]
  });

  table.render({
    elem: '#ruleTable',
    data: [],
    height: 360,
    page: false,
    defaultToolbar: [],
    cols: [[
      {field: 'wordsText', title: '关键词', minWidth: 170},
      {field: 'filterWordsText', title: '过滤词', minWidth: 190},
      {field: 'lowCommentNum', title: '评论', width: 86},
      {field: 'lowWorthyNum', title: '值率', width: 86},
      {field: 'minPrice', title: '最低价', width: 100},
      {field: 'maxPrice', title: '最高价', width: 100},
      {fixed: 'right', width: 190, align: 'center', toolbar: '#ruleActions'}
    ]]
  });

  loadProductConfig();

  $('#addAccount').on('click', function(){
    layer.open({
      type: 2,
      title: '新增签到账号',
      shadeClose: true,
      area: ['680px', '560px'],
      content: 'html/form'
    });
  });

  table.on('tool(accountTable)', function(obj){
    if (obj.event !== 'check') {
      return;
    }
    var lineData = obj.data;
    $.ajax({
      url: BASE_URL + '/check',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify([{ cookie: lineData.Cookie, id: lineData.Id, remark: lineData.Remark }]),
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        layer.msg(res.data || res.msg);
        table.reload('accountTable');
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  });

  table.on('tool(ruleTable)', function(obj){
    if (obj.event === 'search') {
      var words = productConfig.keywordRules[obj.data._index].words || [];
      if (words.length) {
        openKeywordSearch(words[0]);
      }
      return;
    }
    if (obj.event === 'edit') {
      openRuleDialog(obj.data._index);
      return;
    }
    if (obj.event === 'remove') {
      productConfig.keywordRules.splice(obj.data._index, 1);
      renderRules();
    }
  });

  $('#addRule').on('click', function(){
    openRuleDialog(-1);
  });

  $('#saveProductConfig').on('click', function(){
    readProductForm();
    $.ajax({
      url: BASE_URL + '/productConfig',
      contentType: 'application/json;charset=utf-8',
      data: JSON.stringify(productConfig),
      dataType: 'json',
      type: 'POST',
      success: function(res) {
        productConfig = normalizeConfig(res.data);
        fillProductForm();
        renderRules();
        layer.msg(res.msg || '保存成功');
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  });

  $('#reloadProductConfig').on('click', loadProductConfig);
  $('#keyWords').on('input', function(){
    renderKeywordCloud(textToList($(this).val()));
  });

  function loadProductConfig() {
    $.ajax({
      url: BASE_URL + '/productConfig',
      dataType: 'json',
      type: 'GET',
      success: function(res) {
        productConfig = normalizeConfig(res.data);
        fillProductForm();
        renderRules();
      },
      error: function(xhr) {
        layer.msg(readError(xhr));
      }
    });
  }

  function readProductForm() {
    productConfig.keyWords = textToList($('#keyWords').val());
    productConfig.filterWords = textToList($('#filterWords').val());
    productConfig.lowCommentNum = toInt($('#lowCommentNum').val());
    productConfig.lowWorthyNum = toInt($('#lowWorthyNum').val());
    productConfig.minPrice = toFloat($('#minPrice').val());
    productConfig.maxPrice = toFloat($('#maxPrice').val());
    productConfig.satisfyNum = toInt($('#satisfyNum').val()) || 5;
    productConfig.tickTime = toInt($('#tickTime').val()) || 10800;
    productConfig.cron = ($('#cron').val() || '').trim() || '0 10 10 ? * *';
    productConfig.telegram = {
      enabled: $('#telegramEnabled').is(':checked'),
      botToken: ($('#telegramBotToken').val() || '').trim(),
      chatId: ($('#telegramChatId').val() || '').trim(),
      parseMode: $('#telegramParseMode').val() || 'HTML',
      disableWebPagePreview: $('#telegramDisablePreview').is(':checked')
    };
  }

  function fillProductForm() {
    $('#keyWords').val(listToText(productConfig.keyWords));
    $('#filterWords').val(listToText(productConfig.filterWords));
    $('#lowCommentNum').val(productConfig.lowCommentNum);
    $('#lowWorthyNum').val(productConfig.lowWorthyNum);
    $('#minPrice').val(productConfig.minPrice);
    $('#maxPrice').val(productConfig.maxPrice);
    $('#satisfyNum').val(productConfig.satisfyNum);
    $('#tickTime').val(productConfig.tickTime);
    $('#cron').val(productConfig.cron);
    $('#telegramEnabled').prop('checked', !!productConfig.telegram.enabled);
    $('#telegramBotToken').val(productConfig.telegram.botToken || '');
    $('#telegramChatId').val(productConfig.telegram.chatId || '');
    $('#telegramParseMode').val(productConfig.telegram.parseMode || 'HTML');
    $('#telegramDisablePreview').prop('checked', !!productConfig.telegram.disableWebPagePreview);
    renderKeywordCloud(productConfig.keyWords);
  }

  function renderKeywordCloud(words) {
    var cloud = $('#keywordCloud');
    cloud.empty();
    if (!words.length) {
      cloud.append('<span class="empty-note">暂无关键词</span>');
      return;
    }
    words.forEach(function(word){
      var chip = $('<span class="chip"></span>');
      chip.append(document.createTextNode(word));
      var btn = $('<button type="button">搜索</button>');
      btn.on('click', function(){
        openKeywordSearch(word);
      });
      chip.append(btn);
      cloud.append(chip);
    });
  }

  function renderRules() {
    var data = productConfig.keywordRules.map(function(rule, index){
      return {
        _index: index,
        wordsText: listToText(rule.words).replace(/\n/g, ', '),
        filterWordsText: listToText(rule.filterWords).replace(/\n/g, ', '),
        lowCommentNum: rule.lowCommentNum || '',
        lowWorthyNum: rule.lowWorthyNum || '',
        minPrice: rule.minPrice || '',
        maxPrice: rule.maxPrice || ''
      };
    });
    table.reload('ruleTable', { data: data });
  }

  function openRuleDialog(index) {
    var rule = index >= 0 ? productConfig.keywordRules[index] : {};
    var html = [
      '<form class="rule-form" id="ruleForm">',
      '<div class="field"><label>关键词</label><textarea name="words" rows="3"></textarea></div>',
      '<div class="field"><label>过滤词</label><textarea name="filterWords" rows="3"></textarea></div>',
      '<div class="grid two">',
      '<div class="field"><label>最低评论</label><input type="number" name="lowCommentNum" min="0"></div>',
      '<div class="field"><label>最低值率(%)</label><input type="number" name="lowWorthyNum" min="0"></div>',
      '<div class="field"><label>最低价格</label><input type="number" name="minPrice" min="0" step="0.01"></div>',
      '<div class="field"><label>最高价格</label><input type="number" name="maxPrice" min="0" step="0.01"></div>',
      '</div>',
      '</form>'
    ].join('');

    layer.open({
      type: 1,
      title: index >= 0 ? '编辑关键词规则' : '新增关键词规则',
      area: ['620px', '620px'],
      content: html,
      btn: ['保存', '取消'],
      success: function(layero){
        layero.find('[name="words"]').val(listToText(rule.words || []));
        layero.find('[name="filterWords"]').val(listToText(rule.filterWords || []));
        layero.find('[name="lowCommentNum"]').val(rule.lowCommentNum || '');
        layero.find('[name="lowWorthyNum"]').val(rule.lowWorthyNum || '');
        layero.find('[name="minPrice"]').val(rule.minPrice || '');
        layero.find('[name="maxPrice"]').val(rule.maxPrice || '');
      },
      yes: function(layerIndex, layero){
        var nextRule = {
          words: textToList(layero.find('[name="words"]').val()),
          filterWords: textToList(layero.find('[name="filterWords"]').val()),
          lowCommentNum: toInt(layero.find('[name="lowCommentNum"]').val()),
          lowWorthyNum: toInt(layero.find('[name="lowWorthyNum"]').val()),
          minPrice: toFloat(layero.find('[name="minPrice"]').val()),
          maxPrice: toFloat(layero.find('[name="maxPrice"]').val())
        };
        if (!nextRule.words.length) {
          layer.msg('关键词不能为空');
          return;
        }
        if (index >= 0) {
          productConfig.keywordRules[index] = nextRule;
        } else {
          productConfig.keywordRules.push(nextRule);
        }
        renderRules();
        layer.close(layerIndex);
      }
    });
  }

  function openKeywordSearch(word) {
    word = (word || '').trim();
    if (!word) {
      return;
    }
    window.open('https://search.smzdm.com/?c=faxian&s=' + encodeURIComponent(word), '_blank', 'noopener');
  }

  function normalizeConfig(value) {
    value = value || {};
    value.telegram = value.telegram || {};
    return {
      keyWords: value.keyWords || [],
      filterWords: value.filterWords || [],
      lowCommentNum: value.lowCommentNum || 0,
      lowWorthyNum: value.lowWorthyNum || 0,
      minPrice: value.minPrice || 0,
      maxPrice: value.maxPrice || 0,
      satisfyNum: value.satisfyNum || 5,
      tickTime: value.tickTime || 10800,
      cron: value.cron || '0 10 10 ? * *',
      telegram: {
        enabled: !!value.telegram.enabled,
        botToken: value.telegram.botToken || '',
        chatId: value.telegram.chatId || '',
        parseMode: value.telegram.parseMode || 'HTML',
        disableWebPagePreview: !!value.telegram.disableWebPagePreview
      },
      keywordRules: (value.keywordRules || []).map(function(rule){
        return {
          words: rule.words || [],
          filterWords: rule.filterWords || [],
          lowCommentNum: rule.lowCommentNum || 0,
          lowWorthyNum: rule.lowWorthyNum || 0,
          minPrice: rule.minPrice || 0,
          maxPrice: rule.maxPrice || 0
        };
      })
    };
  }

  function listToText(list) {
    return (list || []).join('\n');
  }

  function textToList(text) {
    return (text || '').split(/[\n,，\t\r]+/).map(function(item){
      return item.trim();
    }).filter(function(item, index, list){
      return item && list.indexOf(item) === index;
    });
  }

  function toInt(value) {
    var parsed = parseInt(value, 10);
    return isNaN(parsed) || parsed < 0 ? 0 : parsed;
  }

  function toFloat(value) {
    var parsed = parseFloat(value);
    return isNaN(parsed) || parsed < 0 ? 0 : parsed;
  }

  function readError(xhr) {
    try {
      return JSON.parse(xhr.responseText).msg || '请求失败';
    } catch (e) {
      return '请求失败';
    }
  }
});
</script>
</body>
</html>
