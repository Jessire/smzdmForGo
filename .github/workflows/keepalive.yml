name: Keep Render service awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --show-error --silent --max-time 20 \
            https://smzdm-for-go.onrender.com/health
